# Sentinel Shield — THIRD-PARTY PHP suspicious-code rules.
#
# Run ONLY against dependency/vendored code (vendor/**, public/vendor/**) in a
# SEPARATE Semgrep channel — never as part of the normal application SAST scan.
# These are heuristics for supply-chain triage; expect to review hits in bundled
# code. metadata.sentinel_shield_category drives the collector's bucket.
#
# Severity guide: decode→exec / RCE → ERROR; generic dynamic-exec, env/network,
# unserialize → WARNING.
rules:
  - id: ss-tp-php-decode-eval
    languages: [php]
    severity: ERROR
    message: >
      Obfuscated execution: a decode/decompress chain feeds eval()/assert(). A
      classic PHP malware/backdoor pattern in third-party code. Inspect the package.
    metadata:
      sentinel_shield_category: third_party_obfuscation
      confidence: HIGH
      cwe: "CWE-506: Embedded Malicious Code"
    pattern-either:
      - pattern: eval(base64_decode(...))
      - pattern: eval(gzinflate(...))
      - pattern: eval(gzuncompress(...))
      - pattern: eval(str_rot13(...))
      - pattern: assert(base64_decode(...))

  - id: ss-tp-php-preg-replace-eval-modifier
    languages: [php]
    severity: ERROR
    message: >
      preg_replace() with the /e modifier executes the replacement as PHP code
      (RCE). Removed in PHP 7 but still seen in malicious/legacy third-party code.
    metadata:
      sentinel_shield_category: third_party_suspicious_code
      confidence: HIGH
      cwe: "CWE-95: Eval Injection"
    pattern-regex: 'preg_replace\s*\(\s*[\x27"][^\x27"]*/[a-zA-Z]*e[a-zA-Z]*[\x27"]'

  - id: ss-tp-php-dynamic-exec
    languages: [php]
    severity: WARNING
    message: >
      Dynamic code execution in third-party code (eval/assert). Confirm it is not a
      backdoor; bundled templating engines sometimes use eval — review.
    metadata:
      sentinel_shield_category: third_party_suspicious_code
      confidence: MEDIUM
      cwe: "CWE-95: Eval Injection"
    pattern-either:
      - pattern: eval(...)
      - pattern: assert($X)

  - id: ss-tp-php-shell-exec
    languages: [php]
    severity: WARNING
    message: >
      OS command execution in third-party code (shell_exec/exec/system/passthru/
      proc_open/popen). Legitimate for some tools; suspicious in most packages.
    metadata:
      sentinel_shield_category: third_party_suspicious_code
      confidence: MEDIUM
      cwe: "CWE-78: OS Command Injection"
    pattern-either:
      - pattern: shell_exec(...)
      - pattern: exec(...)
      - pattern: system(...)
      - pattern: passthru(...)
      - pattern: proc_open(...)
      - pattern: popen(...)

  - id: ss-tp-php-unserialize
    languages: [php]
    severity: WARNING
    message: >
      unserialize() in third-party code can enable object-injection / gadget chains
      if fed untrusted data. Prefer json_decode; review the data source.
    metadata:
      sentinel_shield_category: third_party_suspicious_code
      confidence: LOW
      cwe: "CWE-502: Deserialization of Untrusted Data"
    pattern: unserialize(...)

  - id: ss-tp-php-env-read
    languages: [php]
    severity: WARNING
    message: >
      Third-party code reads .env directly. Combined with an outbound request this
      is an env/secret-exfiltration indicator — inspect surrounding code.
    metadata:
      sentinel_shield_category: third_party_network_behavior
      confidence: MEDIUM
      cwe: "CWE-200: Exposure of Sensitive Information"
    pattern-either:
      - pattern: file_get_contents(".env")
      - pattern: file_get_contents('...env')
      - pattern: fopen(".env", ...)

  - id: ss-tp-php-outbound-network
    languages: [php]
    severity: WARNING
    message: >
      Outbound network primitive in third-party code (curl_exec/fsockopen/
      stream_socket_client). Confirm the package is expected to make connections.
    metadata:
      sentinel_shield_category: third_party_network_behavior
      confidence: LOW
      cwe: "CWE-913: Improper Control of Dynamically-Managed Code Resources"
    pattern-either:
      - pattern: curl_exec(...)
      - pattern: fsockopen(...)
      - pattern: stream_socket_client(...)
