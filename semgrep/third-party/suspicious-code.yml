# Sentinel Shield — THIRD-PARTY cross-cutting supply-chain rules.
#
# Run ONLY in the separate third-party channel against dependency dirs
# (node_modules/**, vendor/**, public/vendor/**, public/js/filament/**). Language-
# specific rules live in php-suspicious.yml and js-suspicious.yml.
# metadata.sentinel_shield_category drives the collector's bucket.
rules:
  - id: ss-tp-npm-install-script
    languages: [generic]
    severity: ERROR
    paths:
      include:
        - "package.json"
        - "*/package.json"
    message: >
      A dependency declares a pre/post/install npm lifecycle script. Install hooks
      run arbitrary code on `npm install` and are the #1 npm supply-chain vector.
      Review what the script does (especially for new/changed dependencies).
    metadata:
      sentinel_shield_category: third_party_install_script_risk
      confidence: MEDIUM
      cwe: "CWE-506: Embedded Malicious Code"
    patterns:
      - pattern-regex: '"(preinstall|install|postinstall)"\s*:'

  - id: ss-tp-long-base64-blob
    languages: [generic]
    severity: WARNING
    paths:
      # Skip source maps; minified bundles are still noisy — this signal is
      # obfuscation-only (non-blocking outside regulated). Tune the length below.
      exclude:
        - "*.map"
    message: >
      Very long base64-like literal in third-party code — a possible packed/
      obfuscated payload. Obfuscation-only signal; correlate with decode→eval hits.
    metadata:
      sentinel_shield_category: third_party_obfuscation
      confidence: LOW
      cwe: "CWE-506: Embedded Malicious Code"
    patterns:
      - pattern-regex: '[A-Za-z0-9+/]{200,}={0,2}'
