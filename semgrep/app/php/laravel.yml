# Sentinel Shield — Laravel-specific Semgrep rules.
# Starter rules. Several are intentionally noisy "review prompts" rather than hard
# bugs — tune severity to your codebase.
rules:
  - id: ss-laravel-mass-assignment-request-all
    languages: [php]
    severity: ERROR
    message: >
      Mass assignment from request()->all(). Use $request->validated() or
      ->only([...]) and define $fillable; never feed all() into create/update.
    metadata:
      category: security
      cwe: "CWE-915: Improperly Controlled Modification of Object Attributes"
    pattern-either:
      - pattern: $X::create($REQUEST->all())
      - pattern: $X::create(request()->all())
      - pattern: $MODEL->update($REQUEST->all())
      - pattern: $MODEL->update(request()->all())
      - pattern: $MODEL->fill($REQUEST->all())
      - pattern: $MODEL->fill(request()->all())

  # NOTE: the review-prompt rule `ss-laravel-missing-authorization-review` moved to
  # semgrep/app/php/laravel-review-prompts.yml (opt-in, INFO severity) in v0.1.3 — it
  # was a high-noise review prompt, not a confirmed bug, and was over-counted as
  # high. Include that file explicitly if you want authorization review prompts.

  - id: ss-laravel-raw-query
    languages: [php]
    severity: ERROR
    message: >
      Raw query with interpolation. DB::raw/whereRaw/selectRaw must use bound
      parameters, never concatenated request data.
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
    pattern-either:
      - pattern: DB::raw("..." . $X . "...")
      - pattern: $Q->whereRaw("..." . $X . "...")
      - pattern: $Q->selectRaw("..." . $X . "...")
      - pattern: DB::statement("..." . $X . "...")

  - id: ss-laravel-app-debug-true
    languages: [generic]
    severity: ERROR
    paths:
      include:
        - ".env"
        - ".env.*"
        - "config/app.php"
      # Do not flag non-production env templates/test envs (APP_DEBUG=true is normal
      # in these). Tune to your project's env-file naming.
      exclude:
        - "*.example"
        - ".env.example"
        - ".env.testing"
        - ".env.testing.*"
        - ".env.local"
        - ".env.ci"
        - ".env.*.example"
    message: >
      APP_DEBUG appears enabled. Debug mode leaks stack traces and config in
      production. Ensure APP_DEBUG=false in production environments.
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
    pattern-regex: 'APP_DEBUG\s*=\s*(true|1)|[\x27"]debug[\x27"]\s*=>\s*true'

  - id: ss-laravel-unsafe-file-upload
    languages: [php]
    severity: WARNING
    message: >
      File stored using the client-supplied name. Use store()/storeAs() with a
      server-generated name, validate MIME by content, and store outside web root.
    metadata:
      category: security
      cwe: "CWE-434: Unrestricted Upload of File with Dangerous Type"
    pattern-either:
      - pattern: $FILE->storeAs($DIR, $FILE->getClientOriginalName())
      - pattern: $FILE->move($DIR, $FILE->getClientOriginalName())
