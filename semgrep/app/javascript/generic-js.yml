# Sentinel Shield — generic JavaScript/TypeScript Semgrep rules. Starter set.
rules:
  - id: ss-js-eval-new-function
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Dynamic code execution (eval/new Function). Remove it; parse data explicitly
      instead of evaluating it.
    metadata:
      category: security
      cwe: "CWE-95: Eval Injection"
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)

  - id: ss-js-hardcoded-secret
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Possible hardcoded secret. Load from environment / secret manager; never
      commit credentials.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
    pattern-either:
      - pattern: const apiKey = "..."
      - pattern: const secret = "..."
      - pattern: const password = "..."
      - pattern: const token = "..."

  - id: ss-js-insecure-random-security
    languages: [javascript, typescript]
    # INFO (-> medium), not high: Math.random() is overwhelmingly used for UI/keys/
    # animation, not security. This is a review prompt — confirm it is not used for
    # tokens/IDs/secrets. Excludes test/story/fixture paths. Tune to your layout.
    severity: INFO
    paths:
      exclude:
        - "tests"
        - "**/tests/*"
        - "**/__tests__/*"
        - "*.test.*"
        - "*.spec.*"
        - "*.stories.*"
        - "fixtures"
        - "examples"
    message: >
      Math.random() is not cryptographically secure. For tokens/IDs/secrets use
      crypto.getRandomValues / crypto.randomBytes. (Review prompt; UI use is fine.)
    metadata:
      category: security
      confidence: LOW
      cwe: "CWE-338: Use of Cryptographically Weak PRNG"
    pattern: Math.random()
