# Sentinel Shield — Dockerfile Semgrep rules. Starter set.
# Hadolint covers most of these too; Semgrep keeps them in the unified scan output.
rules:
  - id: ss-docker-root-user
    languages: [generic]
    paths:
      include: ["Dockerfile", "Dockerfile.*", "*.Dockerfile"]
    severity: ERROR
    message: >
      Container runs as root. Add a non-root USER directive before CMD/ENTRYPOINT.
    metadata:
      category: security
      cwe: "CWE-250: Execution with Unnecessary Privileges"
    pattern-regex: '(?i)^\s*USER\s+root\s*$'

  - id: ss-docker-latest-tag
    languages: [generic]
    paths:
      include: ["Dockerfile", "Dockerfile.*", "*.Dockerfile"]
    severity: ERROR
    message: >
      Base image uses :latest. Pin to a specific version/digest for
      reproducibility. (Untagged FROM lines are not flagged by this rule:
      a bare name is usually a multi-stage build alias.)
    metadata:
      category: security
      cwe: "CWE-1357: Reliance on Insufficiently Trustworthy Component"
    pattern-regex: '(?i)^\s*FROM\s+\S+:latest(\s|$)'

  - id: ss-docker-secret-in-env
    languages: [generic]
    paths:
      include: ["Dockerfile", "Dockerfile.*", "*.Dockerfile"]
    severity: ERROR
    message: >
      Possible secret baked into an image layer via ENV/ARG. Inject secrets at
      runtime or use BuildKit --mount=type=secret.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
    pattern-regex: '(?i)^\s*(ENV|ARG)\s+\w*(PASSWORD|SECRET|TOKEN|API_?KEY)\w*\s*[=\s]\S+'

  - id: ss-docker-curl-pipe-shell
    languages: [generic]
    paths:
      include: ["Dockerfile", "Dockerfile.*", "*.Dockerfile"]
    severity: WARNING
    message: >
      Piping a downloaded script straight into a shell (curl|sh) runs unverified
      remote code. Download, verify a checksum, then execute.
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
    pattern-regex: '(?i)(curl|wget)\s+[^\n|]*\|\s*(sudo\s+)?(sh|bash)'

  - id: ss-docker-privileged-compose
    languages: [generic]
    paths:
      include: ["docker-compose.yml", "docker-compose.*.yml", "compose.yaml"]
    severity: ERROR
    message: >
      privileged: true grants near-host access and defeats container isolation.
    metadata:
      category: security
      cwe: "CWE-250: Execution with Unnecessary Privileges"
    pattern-regex: '(?i)^\s*privileged:\s*true'
