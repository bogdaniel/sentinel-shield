# Sentinel Shield — PHP CI (Laravel / Symfony).
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
# Copy to .github/workflows/ in the consuming project and tune as needed.
name: ci-php

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Minimal permissions: read-only by default.
permissions:
  contents: read

concurrency:
  group: ci-php-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine repo (shell-based) is not a PHP project, so the gate below skips (green)
  # instead of failing on a missing root composer.json. Consumers that vendor this CI and
  # have a composer.json run it normally — and an engine FORK (still no composer.json) also
  # skips correctly, which a hardcoded repo-name guard could not do.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect composer.json
        id: check
        run: |
          if [ -f composer.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
  php:
    needs: detect
    if: ${{ needs.detect.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies (from lockfile)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Composer audit
        # Blocking in baseline+. In report-only, append: || true
        run: composer audit --locked

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Psalm
        run: vendor/bin/psalm --no-cache --no-progress

      - name: Psalm taint analysis (optional but recommended)
        run: vendor/bin/psalm --taint-analysis --no-cache --no-progress
        continue-on-error: true

      - name: Code style (Pint or PHP-CS-Fixer)
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test
          elif [ -f vendor/bin/php-cs-fixer ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff
          else
            echo "No style tool installed; skipping."
          fi

      - name: Rector dry-run (optional)
        run: vendor/bin/rector process --dry-run
        continue-on-error: true

      - name: Architecture boundaries (Deptrac, optional)
        run: |
          if [ -f vendor/bin/deptrac ] && [ -f deptrac.yaml ]; then
            vendor/bin/deptrac analyse --config-file=deptrac.yaml --no-progress
          else
            echo "Deptrac not configured; skipping."
          fi

      - name: Tests
        run: |
          if [ -f artisan ]; then
            php artisan test
          else
            vendor/bin/phpunit
          fi

      # --- Sentinel Shield raw reports (best-effort; for normalization) ---
      # Writes reports/raw/*.json for the PHP collectors. Each line tolerates a
      # missing tool or a non-zero exit (tools emit JSON even when they find issues).
      # Project-specific: tune flags/paths. tests.json must be a normalized
      # { "failures": N, "errors": N } produced by your test step — not faked here.
      - name: Sentinel Shield raw reports
        if: always()
        run: |
          mkdir -p reports/raw
          [ -x vendor/bin/phpstan ] && vendor/bin/phpstan analyse --error-format=json > reports/raw/phpstan.json 2>/dev/null || true
          [ -x vendor/bin/psalm ] && vendor/bin/psalm --output-format=json > reports/raw/psalm.json 2>/dev/null || true
          if [ -x vendor/bin/deptrac ] && [ -f deptrac.yaml ]; then
            vendor/bin/deptrac analyse --config-file=deptrac.yaml --formatter=json --output=reports/raw/deptrac.json --no-progress || true
          fi
          composer audit --locked --format=json > reports/raw/composer-audit.json 2>/dev/null || true
          echo "raw PHP reports written (where tools were available):"
          ls -1 reports/raw 2>/dev/null || true

      - name: Upload raw PHP reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-raw-security-php
          path: reports/raw/*.json
          retention-days: 90
          if-no-files-found: warn
