# Sentinel Shield — CodeQL static analysis.
#
# ACTION PINNING: the `uses:` references below show version tags for readability.
# Per docs/github-actions-security.md, pin every third-party action to a full commit
# SHA before using this in a sensitive (deploy/release) workflow. First-party
# github/codeql-action may run on a major tag.
name: ci-codeql

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 3 * * 1"   # weekly deep run, Mondays 03:00 UTC

permissions:
  contents: read

concurrency:
  group: ci-codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CodeQL javascript-typescript needs an analyzable JS/TS app (marked by a root
  # package.json). The engine ships only shell + a couple of eslint config files (no
  # analyzable source), so analyze skips (green) instead of the CodeQL "no source code
  # seen" fatal. Consumers with a JS/TS app run it normally.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect package.json
        id: check
        run: |
          if [ -f package.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
  analyze:
    needs: detect
    if: ${{ needs.detect.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write   # required to upload CodeQL results
    strategy:
      fail-fast: false
      matrix:
        # Adjust to the languages present in the project.
        # CodeQL languages: javascript-typescript, java-kotlin, python, go, ...
        # PHP is supported via the community pack; configure separately if needed.
        language: ["javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:${{ matrix.language }}"
