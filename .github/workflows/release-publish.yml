# Sentinel Shield — GitHub Release publisher.
#
# Fires ONLY when a human has already created and pushed a signed `v*` tag. It creates
# the GitHub Release from docs/<tag>-release-notes.md and verifies the published release
# — it NEVER creates, moves, or force-updates the tag itself, so the signed-tag airlock
# (the human holding the signing key) is preserved. `gh release create --verify-tag`
# refuses to publish if the pushed tag is missing/mismatched.
#
# Prerequisite: docs/<tag>-release-notes.md must exist in the tagged commit (the job fails
# closed otherwise). Prerelease vs latest is derived from the tag suffix (-rc/-beta/-alpha).
name: release-publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release for the pushed tag

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0   # need the tag object + history for verification

      - name: Resolve tag, notes, and release kind
        id: meta
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME}"
          NOTES="docs/${TAG}-release-notes.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::release notes '$NOTES' not found in the tagged commit; refusing to publish" >&2
            exit 1
          fi
          # Prerelease when the tag carries a pre-release suffix; GA otherwise.
          case "$TAG" in
            *-rc*|*-beta*|*-alpha*) KIND="--prerelease" ;;
            *)                      KIND="--latest" ;;
          esac
          {
            echo "tag=$TAG"
            echo "notes=$NOTES"
            echo "kind=$KIND"
            echo "commit=$(git rev-list -n1 "$TAG")"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (verifies the pushed tag)
        # Pass step outputs via env (NOT inline ${{ }} in run) so they cannot expand
        # into the shell as code — a tag name is attacker-influenceable. (zizmor: template-injection)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES: ${{ steps.meta.outputs.notes }}
          KIND: ${{ steps.meta.outputs.kind }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --repo "$REPO" \
            --verify-tag \
            --title "Sentinel Shield $TAG" \
            --notes-file "$NOTES" \
            $KIND

      - name: Verify the published release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          STAGE=ga
          case "$TAG" in *-rc*) STAGE=rc ;; *-beta*) STAGE=beta ;; *-alpha*) STAGE=alpha ;; esac
          sh scripts/verify-published-release.sh verify-github-release \
            --tag "$TAG" \
            --stage "$STAGE" \
            --repo "$REPO" \
            --expected-commit "$COMMIT"
