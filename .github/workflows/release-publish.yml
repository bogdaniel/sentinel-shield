# Sentinel Shield — GitHub Release publisher.
#
# Fires ONLY when a human has already created and pushed a signed `v*` tag. It creates
# the GitHub Release from docs/<tag>-release-notes.md and verifies the published release
# — it NEVER creates, moves, or force-updates the tag itself, so the signed-tag airlock
# (the human holding the signing key) is preserved. `gh release create --verify-tag`
# refuses to publish if the pushed tag is missing/mismatched.
#
# Prerequisite: docs/<tag>-release-notes.md must exist in the tagged commit (the job fails
# closed otherwise). Prerelease vs latest is derived from the tag suffix (-rc/-beta/-alpha).
name: release-publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release for the pushed tag

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0   # need the tag object + history for verification

      - name: Resolve tag, notes, and release kind
        id: meta
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eu
          TAG="${GITHUB_REF_NAME}"
          NOTES="docs/${TAG}-release-notes.md"
          BR="${DEFAULT_BRANCH:-master}"
          # Source-tag releases tag the CI-proven engine commit, which predates the notes
          # (the notes are merged to the default branch separately). Resolve them from the
          # tagged tree first, else from the default branch. Skip cleanly (never fail the
          # tag push) if neither has them — a human can still publish manually.
          if [ ! -f "$NOTES" ]; then
            git fetch --quiet --depth=1 origin "$BR" 2>/dev/null || true
            if git show "FETCH_HEAD:$NOTES" > "/tmp/${TAG}-notes.md" 2>/dev/null \
               || git show "origin/${BR}:$NOTES" > "/tmp/${TAG}-notes.md" 2>/dev/null; then
              NOTES="/tmp/${TAG}-notes.md"
            else
              echo "::warning::release notes for '$TAG' not found in the tagged commit or the default branch; skipping auto-publish (publish manually)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          # Prerelease when the tag carries a pre-release suffix; GA otherwise.
          case "$TAG" in
            *-rc*|*-beta*|*-alpha*) KIND="--prerelease" ;;
            *)                      KIND="--latest" ;;
          esac
          {
            echo "skip=false"
            echo "tag=$TAG"
            echo "notes=$NOTES"
            echo "kind=$KIND"
            echo "commit=$(git rev-list -n1 "$TAG")"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (verifies the pushed tag)
        if: steps.meta.outputs.skip != 'true'
        # Pass step outputs via env (NOT inline ${{ }} in run) so they cannot expand
        # into the shell as code — a tag name is attacker-influenceable. (zizmor: template-injection)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES: ${{ steps.meta.outputs.notes }}
          KIND: ${{ steps.meta.outputs.kind }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          # Idempotent: if a human already published this tag manually, do not fail.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it as-is (idempotent)."
            exit 0
          fi
          # shellcheck disable=SC2086
          if ! gh release create "$TAG" \
              --repo "$REPO" \
              --verify-tag \
              --title "Sentinel Shield $TAG" \
              --notes-file "$NOTES" \
              $KIND; then
            # A concurrent publisher may have created it between the check and now.
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              echo "Release $TAG was created concurrently; treating as success."
              exit 0
            fi
            exit 1
          fi

      - name: Verify the published release
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          STAGE=ga
          case "$TAG" in *-rc*) STAGE=rc ;; *-beta*) STAGE=beta ;; *-alpha*) STAGE=alpha ;; esac
          sh scripts/verify-published-release.sh verify-github-release \
            --tag "$TAG" \
            --stage "$STAGE" \
            --repo "$REPO" \
            --expected-commit "$COMMIT"
