# Sentinel Shield — Release gate aggregator.
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
#
# Flow: resolve -> obtain summary -> apply fallback policy -> enforce.
#   1. scripts/resolve-gates.sh writes the resolved SENTINEL_SHIELD_FAIL_ON_* flags
#      and the adoption mode.
#   2. The normalized findings document, reports/security-summary.json, is obtained
#      from the "sentinel-shield-security-summary" artifact produced by the scanner
#      workflows (build-security-summary.sh).
#   3. scripts/select-security-summary.sh applies the FALLBACK POLICY:
#        report-only            -> may use the all-zero EXAMPLE (loud warning).
#        baseline/strict/regulated -> a REAL summary is REQUIRED; otherwise FAIL.
#      The example is never accepted as evidence in baseline/strict/regulated.
#   4. scripts/enforce-gates.sh maps the resolved flags onto the summary and exits
#      0 (pass) / 1 (fail) / 2 (config error). Its exit code IS the release gate.
#
# ARTIFACT TOPOLOGY — IMPORTANT:
#   actions/download-artifact retrieves artifacts from the CURRENT run only. For
#   production, run this gate job in the SAME workflow as the scanner jobs using
#   `needs:` so the summary artifact is in-run (see README "CI artifact handoff").
#   This standalone template's download step is best-effort: if no real summary is
#   present, baseline/strict/regulated FAIL by design (fail-closed). Do NOT add
#   artifact discovery that pulls from arbitrary/untrusted runs.
#
# This job does NOT re-run scanners. It enforces the normalized contract.
name: ci-release-gate

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        description: "Force adoption mode (overrides profile gates.mode); 'inherit' = no override"
        required: false
        default: inherit
        type: choice
        options: [inherit, report-only, baseline, strict, regulated]

permissions:
  contents: read

concurrency:
  group: ci-release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    environment: production   # protected: require reviewers before this gate releases
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve gates from profile
        env:
          MODE_INPUT: ${{ github.event.inputs.mode }}
        run: |
          set -eu
          # Locate the resolver whether Sentinel Shield is vendored at repo root
          # (scripts/) or under .sentinel-shield/scripts/ (install-baseline layout).
          RESOLVER=scripts/resolve-gates.sh
          if [ ! -f "$RESOLVER" ]; then RESOLVER=.sentinel-shield/scripts/resolve-gates.sh; fi
          if [ ! -f "$RESOLVER" ]; then
            echo "::error::resolve-gates.sh not found (expected scripts/ or .sentinel-shield/scripts/)"
            exit 1
          fi
          MODE_ARG=""
          if [ -n "$MODE_INPUT" ] && [ "$MODE_INPUT" != "inherit" ]; then
            MODE_ARG="--mode $MODE_INPUT"
          fi
          # No --require-profile: a project without a profile resolves to report-only.
          sh "$RESOLVER" $MODE_ARG --output-dir reports --format all

      - name: Upload resolved gate artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-gate-resolution
          path: |
            reports/sentinel-shield-gates.env
            reports/sentinel-shield-gates.json
            reports/sentinel-shield-gates.md
          retention-days: 90
          if-no-files-found: error

      - name: Download security summary (same-run artifact, if present)
        # Works when a prior job in THIS run produced the summary (needs: topology).
        # Best-effort: a standalone tag run has no such artifact, and the fallback
        # policy below fails baseline/strict/regulated accordingly.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sentinel-shield-security-summary
          path: reports
        continue-on-error: true

      - name: Download raw reports (finding-scope unsafe_docker matching)
        # v0.1.10: enforce-gates.sh matches unsafe_docker findings against the raw reports
        # (reports/raw/hadolint.json + reports/raw/docker-base-digest.json). Provide them
        # so finding-scope accepted-risks match; without them the gate fails closed.
        # Best-effort: a standalone run may have no such artifact.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: sentinel-shield-raw-security*
          path: reports/raw
          merge-multiple: true
        continue-on-error: true

      - name: Apply security-summary fallback policy
        run: |
          set -eu
          SELECT=scripts/select-security-summary.sh
          if [ ! -f "$SELECT" ]; then SELECT=.sentinel-shield/scripts/select-security-summary.sh; fi
          if [ ! -f "$SELECT" ]; then
            echo "::error::select-security-summary.sh not found"
            exit 1
          fi
          EXAMPLE=templates/security-summary.example.json
          if [ ! -f "$EXAMPLE" ]; then EXAMPLE=.sentinel-shield/templates/security-summary.example.json; fi
          # Reads the resolved mode from reports/sentinel-shield-gates.env.
          # Exit 1 here = "real summary required but missing" -> the gate fails,
          # which is the intended fail-closed behavior for baseline/strict/regulated.
          sh "$SELECT" \
            --summary reports/security-summary.json \
            --example "$EXAMPLE" \
            --gates-env reports/sentinel-shield-gates.env

      - name: Enforce gates
        run: |
          set -eu
          ENFORCER=scripts/enforce-gates.sh
          if [ ! -f "$ENFORCER" ]; then ENFORCER=.sentinel-shield/scripts/enforce-gates.sh; fi
          if [ ! -f "$ENFORCER" ]; then
            echo "::error::enforce-gates.sh not found (expected scripts/ or .sentinel-shield/scripts/)"
            exit 1
          fi
          # enforce-gates.sh exits: 0 pass, 1 fail, 2 config/input error.
          # Its non-zero exit fails this job — that IS the release gate.
          sh "$ENFORCER" \
            --gates-env reports/sentinel-shield-gates.env \
            --summary reports/security-summary.json \
            --output-dir reports --format all

      - name: Upload enforcement artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-enforcement
          path: |
            reports/security-summary.json
            reports/sentinel-shield-enforcement.json
            reports/sentinel-shield-enforcement.md
          retention-days: 90
          if-no-files-found: warn

      - name: Assemble release evidence
        if: always()
        env:
          REF: ${{ github.ref }}
        run: |
          set -eu
          mkdir -p reports
          {
            echo "# Sentinel Shield Release Evidence"
            echo ""
            echo "- Repository: ${{ github.repository }}"
            echo "- Ref: $REF"
            echo "- Commit: ${{ github.sha }}"
            echo "- Run: ${{ github.run_id }}"
            echo ""
            echo "## Resolved gates"
            echo ""
            [ -f reports/sentinel-shield-gates.md ] && cat reports/sentinel-shield-gates.md
            echo ""
            echo "## Enforcement"
            echo ""
            [ -f reports/sentinel-shield-enforcement.md ] && cat reports/sentinel-shield-enforcement.md
          } > reports/release-evidence.md

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-release-evidence
          path: reports/release-evidence.md
          retention-days: 90
          if-no-files-found: warn

      - name: Gate summary
        if: always()
        env:
          REF: ${{ github.ref }}
        run: |
          {
            echo "## Sentinel Shield Release Gate"
            echo "- Ref: $REF"
            echo ""
            if [ -f reports/sentinel-shield-enforcement.md ]; then
              cat reports/sentinel-shield-enforcement.md
            elif [ -f reports/sentinel-shield-gates.md ]; then
              cat reports/sentinel-shield-gates.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
