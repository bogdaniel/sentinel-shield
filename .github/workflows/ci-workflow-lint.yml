# Sentinel Shield — workflow linting (actionlint + zizmor).
#
# Meta-CI for the ENGINE repo's own workflows. It lints both the engine CI
# (.github/workflows/*.yml) and the consumer-facing templates (templates/workflows/*.yml)
# for syntax, shell issues, and CI security smells. This is the authoritative replacement
# for the local grep/yq structural checks in tests/prod/110-workflows.sh — it does NOT
# run on the consumer's runner and is NOT part of run-local-pipeline.sh.
#
# TOOLING IS PINNED, NEVER INSTALLED AD-HOC (no `curl | sh`, no floating `:latest`):
#   - actionlint runs as a DIGEST-pinned container (rhysd ships no official action).
#   - zizmor runs via the official SHA-pinned action, with its binary VERSION pinned too
#     (the action SHA freezes the action; `version:` freezes the zizmor binary).
# Bump policy: Dependabot's github-actions ecosystem auto-bumps the zizmor-action SHA and
# actions/checkout. It does NOT track an inline `docker run image@digest`, so the actionlint
# image digest + tag below (and zizmor's `version:`) must be bumped MANUALLY on review —
# refresh the digest with: docker buildx imagetools inspect rhysd/actionlint:<tag>.
#
# ACTION PINNING: every `uses:`/image is a full commit SHA / image digest with a readable
# trailing version comment (docs/github-actions-security.md).
name: ci-workflow-lint

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # actionlint: syntax + embedded shellcheck. Explicit paths so the consumer TEMPLATES
      # (templates/workflows/, outside actionlint's default .github/workflows discovery) are
      # linted alongside the engine CI under .github/workflows.
      # SHELLCHECK_OPTS mirrors the repo's script policy (shellcheck -S error): block on
      # error-severity embedded-shellcheck only, not info-level quoting nits, while
      # actionlint's own rules (pinning, syntax, injection) still apply at all severities.
      - name: actionlint (digest-pinned container)
        run: |
          docker run --rm -e SHELLCHECK_OPTS="--severity=error" \
            -v "${{ github.workspace }}:/repo" -w /repo \
            rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 \
            -color \
            .github/workflows/*.yml templates/workflows/*.yml

      # zizmor: CI security audit (unpinned actions, injection, excessive permissions, …).
      # advanced-security:false + annotations:true surfaces findings as PR annotations
      # without requiring GitHub Advanced Security or security-events: write.
      - name: zizmor (CI security audit)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: "1.26.1"
          inputs: ".github/workflows/ templates/workflows/"
          advanced-security: false
          annotations: true

  # Runtime-hardening gate: asserts SHA-pinned uses:, explicit per-job
  # permissions + timeout-minutes, a workflow-level concurrency group, and
  # if-no-files-found on every upload-artifact — across BOTH the engine CI and
  # the consumer templates. Complements actionlint/zizmor with the invariants
  # those linters do not enforce. Fail-closed; no continue-on-error.
  workflow-runtime-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: workflow-runtime audit (uses/permissions/timeout/concurrency/artifacts)
        run: sh scripts/audits/workflow-runtime-audit.sh
