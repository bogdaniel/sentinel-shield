# Sentinel Shield — Security CI: SAST, secrets, deps, SBOM.
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
name: ci-security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual trigger so the heavy, non-PR security-acceptance-live job can be run on demand
  # (e.g. to (re)produce the release security-acceptance artifact without a code push).
  # NOTE: GitHub reads workflow_dispatch config from the DEFAULT branch, so this only
  # becomes dispatchable once merged to master.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine has no dependency manifests of its own — the only lockfiles/manifests in the
  # tree are deliberately-vulnerable sample projects under tests/ and examples/. Gate the
  # DEPENDENCY scanners (osv-scanner, grype/SBOM) on a real root manifest so they skip
  # (green) on the engine and run normally for consumers that vendor this CI. (semgrep and
  # gitleaks still run on the engine's own code, with fixtures excluded via .semgrepignore /
  # .gitleaks.toml.)
  detect-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect root dependency manifest
        id: check
        run: |
          if [ -f composer.json ] || [ -f composer.lock ] || [ -f package.json ] || [ -f package-lock.json ] || [ -f yarn.lock ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      # Maintained Semgrep image. Pin to a digest (image: semgrep/semgrep@sha256:...)
      # for reproducibility in sensitive pipelines.
      image: semgrep/semgrep:1.165.0   # SENTINEL_SHIELD_SEMGREP_IMAGE default; pin by digest before prod
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Semgrep
        # Use the bundled Sentinel Shield rules plus registry packs as desired.
        run: semgrep --error --config ./semgrep/app --config "p/owasp-top-ten"

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks (secret scan — blocking in ALL modes)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          # gitleaks-action v2 requires a token to enumerate PR commits (read-only;
          # the default automatic token suffices). Without it the action hard-errors
          # before scanning. Config + fixture allowlist come from .gitleaks.toml.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  osv-scanner:
    needs: detect-deps
    if: ${{ needs.detect-deps.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

  trivy-fs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  sbom:
    needs: detect-deps
    if: ${{ needs.detect-deps.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate SBOM (Syft)
        # SPDX JSON at reports/sbom.spdx.json — the path the builder checks for the
        # missing_sbom evidence gate.
        run: mkdir -p reports
      - name: Syft SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: reports/sbom.spdx.json

      - name: Scan SBOM (Grype)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: reports/sbom.spdx.json
          severity-cutoff: high
          fail-build: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-sbom
          path: reports/sbom.spdx.json
          retention-days: 90
          if-no-files-found: error

  # Produce raw scanner artifacts and normalize them into security-summary.json.
  # This job demonstrates the contract; the exact tool flags depend on the project.
  # In a fuller pipeline, the PHP/Node/Docker workflows would also write
  # reports/raw/*.json (phpstan, psalm, deptrac, tests, hadolint, ...), be uploaded
  # as artifacts, and a single job would download them all before building.
  security-summary:
    runs-on: ubuntu-latest
    # Multi-scanner job (Semgrep + third-party Semgrep + Gitleaks + Trivy + build/upload);
    # matches ci-pipeline's security-scan budget — 10m can be exceeded on cold runners.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare raw dir
        run: mkdir -p reports/raw

      - name: Semgrep (JSON → reports/raw/semgrep.json)
        # Conservative: never abort the summary on findings; the release gate decides.
        # Pin to a digest (semgrep/semgrep@sha256:...) before production.
        # -w /src runs Semgrep from the repo root so a project-local .semgrepignore
        # is honored (excludes vendored/generated assets — SAST only; dependency
        # scanners below are unaffected). See docs/semgrep-scoping.md.
        run: |
          docker run --rm -v "$PWD:/src" -w /src "${SENTINEL_SHIELD_SEMGREP_IMAGE:-semgrep/semgrep:1.165.0}" \
            semgrep --json --output /src/reports/raw/semgrep.json \
            --config /src/semgrep/app || true
        continue-on-error: true

      - name: Third-party suspicious-code scan (SEPARATE channel)
        # Supply-chain SAST over dependency/vendored code ONLY — separate from the app
        # scan above, SEPARATE artifact (third-party-semgrep.json), high-confidence
        # rules only (semgrep/supply-chain/third-party). Skips cleanly when no
        # dependency dirs exist. NOT a replacement for Trivy/composer audit/npm audit/
        # Gitleaks/SBOM. See docs/third-party-supply-chain-scan.md.
        #
        # Discovery: each dependency dir is bind-mounted under a NEUTRAL name
        # (/scan/depN) so Semgrep's built-in ignore (which always skips node_modules/
        # vendor) does not exclude it, and so there is no .git ancestor forcing
        # git-tracked-only discovery. Minified/build output is excluded.
        run: |
          mkdir -p reports/raw
          MOUNTS=""; SCANT=""; i=0
          for d in vendor node_modules public/vendor public/js/filament; do
            if [ -d "$d" ]; then i=$((i+1)); MOUNTS="$MOUNTS -v $PWD/$d:/scan/dep$i:ro"; SCANT="$SCANT /scan/dep$i"; fi
          done
          if [ -z "$SCANT" ]; then
            echo "No dependency dirs present; skipping third-party scan (collector marks unavailable)."
            exit 0
          fi
          # shellcheck disable=SC2086 # $MOUNTS/$SCANT intentionally word-split into multiple -v/path args
          docker run --rm -v "$PWD:/src" $MOUNTS --entrypoint sh "${SENTINEL_SHIELD_SEMGREP_IMAGE:-semgrep/semgrep:1.165.0}" -c \
            "cd /tmp && semgrep --json --output /src/reports/raw/third-party-semgrep.json \
              --config /src/semgrep/supply-chain/third-party \
              --exclude='*.min.js' --exclude='dist' --exclude='build' --exclude='coverage' $SCANT" || true
        continue-on-error: true

      - name: Gitleaks (JSON → reports/raw/gitleaks.json)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --report-format json \
            --report-path /repo/reports/raw/gitleaks.json --redact || true
        continue-on-error: true

      - name: Trivy (JSON → reports/raw/trivy.json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/raw/trivy.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Build security-summary.json
        # jq is preinstalled on ubuntu-latest. Missing raw files are tolerated
        # (tools recorded "unavailable") unless --strict-tools/--require-tool is set.
        env:
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          sh scripts/build-security-summary.sh \
            --project-name "${{ github.repository }}" \
            --project-type "unknown" \
            --criticality "medium" \
            --commit "${{ github.sha }}" \
            --branch "$REF_NAME" \
            --workflow "$WORKFLOW_NAME"

      - name: Fail-closed credential scan of the security summary (never upload a confirmed secret)
        # Screens the produced, normalized summary for HIGH-CONFIDENCE credential shapes before it
        # is uploaded. scripts/lib/redaction.sh :: rd_scan_paths prints a redaction report (COUNTS
        # + CATEGORY names only, NEVER a value; schemas/redaction-report.schema.json) and returns
        # non-zero if any confirmed secret is present. Fail closed — no continue-on-error, no
        # `|| true`. (The deliberately-vulnerable sample projects live under tests/ and are not in
        # this normalized summary, so this gate screens release-relevant output only.)
        run: |
          sh -eu -c '. scripts/lib/sentinel-shield-common.sh; . scripts/lib/redaction.sh; rd_scan_paths reports/security-summary.json'

      - name: Upload raw scanner artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-raw-security
          path: reports/raw/*.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload security summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-security-summary
          path: reports/security-summary.json
          retention-days: 90
          if-no-files-found: error

  # Production security ACCEPTANCE gate (MACRO-TASK 3). Proves the acceptance engine and
  # its policy are internally consistent and FAIL CLOSED: it validates the canonical
  # production-security-policy against its schema and runs the deterministic, network-free
  # acceptance/incident-response contract (tests/prod/261-production-security.sh) as a
  # BLOCKING job. No continue-on-error / advisory steps: any non-green assertion fails CI.
  security-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Ensure jq
        run: |
          command -v jq >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y jq; }
      - name: Shell syntax (acceptance engine)
        run: |
          for f in scripts/enforce-security-policy.sh scripts/normalize-security-summary.sh scripts/lib/security-policy.sh; do
            sh -n "$f"
          done
      - name: Production security policy conforms to its schema (structural)
        run: |
          sh -c '. scripts/lib/sentinel-shield-common.sh; . scripts/lib/security-policy.sh; sp_validate_policy config/production-security-policy.json'
      - name: Production security acceptance + incident-response contract (BLOCKING)
        run: sh tests/prod/261-production-security.sh

  # Production security ACCEPTANCE (LIVE). Runs every REQUIRED scanner over the tree, builds
  # the scanner manifest, normalizes it, and runs the fail-closed acceptance gate — producing
  # the security-acceptance.json artifact the release-authorization consumes (GATE 4). Each
  # scanner writes native JSON to reports/raw/<name>.json; build-scanner-manifest recomputes
  # applicability the same way the gate does, so the manifest can never disagree with it.
  security-acceptance-live:
    # Release evidence is collected from default-branch push runs (Phase 2), so this heavy
    # 6-scanner job runs on push / schedule / manual dispatch — not on every PR. PR-time scanner
    # coverage is provided by the security-summary job above.
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Gitleaks scans git history by default; a shallow clone would miss secrets in
          # older commits, so fetch the full history for the live secret scan.
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure jq
        run: command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)

      - name: Prepare raw dir
        run: mkdir -p reports/raw

      # Each scanner step below runs its scanner tolerating a findings exit code, then REQUIRES a
      # valid JSON report of the expected shape. A crashed/absent scanner leaves no valid report
      # and FAILS the job — a required scanner outage must never be laundered into a clean "no
      # findings" acceptance artifact. Empty output is only canonicalized for tools that emit
      # nothing on a clean run (osv-scanner, actionlint), and only when their exit code proves the
      # run succeeded — never as an unconditional fallback that masks a failure.
      - name: Semgrep (JSON → reports/raw/semgrep.json)
        run: |
          docker run --rm -v "$PWD:/src" -w /src "${SENTINEL_SHIELD_SEMGREP_IMAGE:-semgrep/semgrep:1.165.0}" \
            semgrep --json --output /src/reports/raw/semgrep.json --config /src/semgrep/app || true
          jq -e '.results | type == "array"' reports/raw/semgrep.json >/dev/null 2>&1 \
            || { echo "semgrep produced no valid JSON report — scanner failure (fail closed)"; exit 1; }

      - name: Gitleaks (JSON → reports/raw/gitleaks.json)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --report-format json \
            --report-path /repo/reports/raw/gitleaks.json --redact || true
          jq -e 'type == "array"' reports/raw/gitleaks.json >/dev/null 2>&1 \
            || { echo "gitleaks produced no valid JSON report — scanner failure (fail closed)"; exit 1; }

      - name: Trivy (JSON → reports/raw/trivy.json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/raw/trivy.json
          severity: CRITICAL,HIGH,MEDIUM
          # Pin the DB cache dir so the freshness step below reads the SAME metadata.json
          # the action just wrote (the action's default is $GITHUB_WORKSPACE/.cache/trivy).
          cache-dir: ${{ github.workspace }}/.cache/trivy
        continue-on-error: true

      - name: Validate Trivy report (fail closed on scanner failure)
        run: |
          jq -e '.SchemaVersion != null' reports/raw/trivy.json >/dev/null 2>&1 \
            || { echo "trivy produced no valid JSON report — scanner failure (fail closed)"; exit 1; }

      - name: OSV-Scanner (JSON → reports/raw/osv-scanner.json)
        run: |
          set +e
          docker run --rm -v "$PWD:/src" -w /src \
            ghcr.io/google/osv-scanner:latest scan source --recursive --format json /src \
            > reports/raw/osv-scanner.json 2> reports/raw/osv-scanner.err
          rc=$?
          set -e
          # osv-scanner: 0 = no vulns, 1 = vulns found; anything else is a genuine failure.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "osv-scanner failed (exit $rc):"; cat reports/raw/osv-scanner.err || true; exit 1
          fi
          [ -s reports/raw/osv-scanner.json ] || echo '{"results":[]}' > reports/raw/osv-scanner.json
          jq -e '.results | type == "array"' reports/raw/osv-scanner.json >/dev/null 2>&1 \
            || { echo "osv-scanner report is not valid JSON — scanner failure (fail closed)"; exit 1; }

      - name: Grype (JSON → reports/raw/grype.json)
        run: |
          set +e
          docker run --rm -v "$PWD:/src" anchore/grype:latest dir:/src -o json \
            > reports/raw/grype.json 2> reports/raw/grype.err
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "grype failed (exit $rc):"; cat reports/raw/grype.err || true; exit 1
          fi
          jq -e '.matches | type == "array"' reports/raw/grype.json >/dev/null 2>&1 \
            || { echo "grype produced no valid JSON report — scanner failure (fail closed)"; exit 1; }

      - name: actionlint (JSON → reports/raw/actionlint.json)
        run: |
          set +e
          docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest -format '{{json .}}' \
            > reports/raw/actionlint.json 2> reports/raw/actionlint.err
          rc=$?
          set -e
          # actionlint: 0 = no issues (emits nothing), 1 = issues found; else a genuine failure.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ]; then
            echo "actionlint failed (exit $rc):"; cat reports/raw/actionlint.err || true; exit 1
          fi
          [ -s reports/raw/actionlint.json ] || echo '[]' > reports/raw/actionlint.json
          jq -e 'type == "array"' reports/raw/actionlint.json >/dev/null 2>&1 \
            || { echo "actionlint report is not valid JSON — scanner failure (fail closed)"; exit 1; }

      - name: Capture scanner versions + DB freshness (freshness evidence)
        run: |
          # Real scanner versions + vulnerability-DB timestamps for the db-backed scanners
          # (osv-scanner/grype/trivy). build-scanner-manifest records these verbatim; a db-backed
          # scanner left without a real timestamp keeps a null freshness and the acceptance gate
          # blocks fail-closed — this workflow never fabricates a freshness it cannot source.
          # grype embeds its DB build time in the scan report descriptor (.descriptor.db.built).
          grype_ver=$(jq -r '.descriptor.version // empty' reports/raw/grype.json 2>/dev/null || true)
          grype_built=$(jq -r '.descriptor.db.built // empty' reports/raw/grype.json 2>/dev/null || true)
          # trivy writes its DB metadata (UpdatedAt) into the action's cache dir during the scan
          # (pinned above to $GITHUB_WORKSPACE/.cache/trivy) — read from that same path.
          trivy_meta="${GITHUB_WORKSPACE:-$PWD}/.cache/trivy/db/metadata.json"
          trivy_updated=$(jq -r '.UpdatedAt // empty' "$trivy_meta" 2>/dev/null || true)
          trivy_ver=$(docker run --rm aquasec/trivy:latest version --format json 2>/dev/null | jq -r '.Version // empty' 2>/dev/null || true)
          osv_ver=$(docker run --rm ghcr.io/google/osv-scanner:latest --version 2>/dev/null | head -n1 | tr -cd '0-9.v' || true)
          # osv-scanner queries the LIVE OSV database during the scan, so its DB freshness is the
          # scan instant — recorded explicitly here as evidence, not defaulted inside the tool.
          osv_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg gv "$grype_ver" --arg gb "$grype_built" \
            --arg tv "$trivy_ver" --arg tu "$trivy_updated" \
            --arg ov "$osv_ver" --arg ots "$osv_ts" '
            def meta($v; $ts): (if $v != "" then {version:$v} else {} end)
                             + (if $ts != "" then {database_timestamp:$ts} else {} end);
            { grype: meta($gv; $gb), trivy: meta($tv; $tu), "osv-scanner": meta($ov; $ots) }
          ' > reports/scanner-meta.json
          cat reports/scanner-meta.json

      - name: Build scanner manifest → normalize → enforce (BLOCKING acceptance)
        run: |
          sh scripts/build-scanner-manifest.sh \
            --raw-dir reports/raw --workspace "$PWD" \
            --scanner-meta reports/scanner-meta.json \
            --source-commit "${GITHUB_SHA}" --output reports/scanner-manifest.json
          sh scripts/normalize-security-summary.sh \
            --manifest reports/scanner-manifest.json \
            --output reports/security-summary.normalized.json
          sh scripts/enforce-security-policy.sh \
            --summary reports/security-summary.normalized.json \
            --source-commit "${GITHUB_SHA}" --workspace "$PWD" \
            --output reports/security-acceptance.json

      - name: Fail-closed credential scan of the acceptance report
        run: |
          sh -eu -c '. scripts/lib/sentinel-shield-common.sh; . scripts/lib/redaction.sh; rd_scan_paths reports/security-acceptance.json'

      - name: Upload security acceptance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-security-acceptance
          path: |
            reports/security-acceptance.json
            reports/scanner-manifest.json
          retention-days: 90
          if-no-files-found: error
