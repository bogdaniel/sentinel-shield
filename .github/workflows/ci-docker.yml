# Sentinel Shield — Docker CI: lint, build, scan.
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
name: ci-docker

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine repo ships only FIXTURE Dockerfiles (incl. an intentionally-bad one for
  # scanner tests), not a buildable app, so the gate below skips (green) instead of
  # failing on a missing root Dockerfile / unbuildable image. Consumers with a root
  # Dockerfile run it normally.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Detect root Dockerfile
        id: check
        run: |
          if [ -f Dockerfile ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
  docker:
    needs: detect
    if: ${{ needs.detect.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Hadolint (all Dockerfiles — lint gate + raw report)
        # Reusable multi-Dockerfile discovery (Dockerfile, Dockerfile.*, docker/**,
        # .docker/**) — replaces the old single-Dockerfile step. Writes the merged
        # reports/raw/hadolint.json AND enforces the warning-level lint gate here.
        run: |
          set -eu
          mkdir -p reports/raw
          sh scripts/run-hadolint.sh
          if [ -f reports/raw/hadolint.json ]; then
            n=$(jq '[.[]? | (.level // "") | select(. == "error" or . == "warning")] | length' reports/raw/hadolint.json)
            [ "$n" -eq 0 ] || { echo "::error::Hadolint: $n error/warning finding(s) across Dockerfiles"; exit 1; }
          fi

      - name: Validate docker-compose
        run: |
          if [ -f docker-compose.yml ] || [ -f compose.yaml ]; then
            docker compose config >/dev/null && echo "compose config valid"
          else
            echo "No compose file; skipping."
          fi

      - name: Build image
        run: docker build -t sentinel-app:ci .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: sentinel-app:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # --- Sentinel Shield raw reports (best-effort; for normalization) ---
      - name: Prepare raw dir
        if: always()
        run: mkdir -p reports/raw

      # (Hadolint raw report is already written by the lint-gate step above via
      # scripts/run-hadolint.sh — no separate single-Dockerfile step needed.)
      - name: Trivy (JSON → reports/raw/trivy.json)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: sentinel-app:ci
          format: json
          output: reports/raw/trivy.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Upload raw Docker reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-raw-security-docker
          path: reports/raw/*.json
          retention-days: 90
          if-no-files-found: warn
