# Sentinel Shield — Node.js / React CI.
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
name: ci-node

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine repo is not a Node project, so the gate below skips (green) instead of
  # failing on a missing root package.json. Consumers with a package.json run it normally;
  # engine forks (still no package.json) also skip correctly.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Detect package.json
        id: check
        run: |
          if [ -f package.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
  node:
    needs: detect
    if: ${{ needs.detect.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install (from lockfile)
        run: npm ci

      - name: Audit (audit-ci if present, else npm audit)
        # Blocking on high/critical in baseline+. report-only: append || true.
        run: |
          if [ -f audit-ci.json ]; then
            npx audit-ci --config audit-ci.json
          else
            npm audit --audit-level=high
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Unused code / deps (Knip, optional)
        run: npx knip
        continue-on-error: true

      - name: Test / build
        run: |
          if npm run | grep -q "^  test"; then npm test; fi
          if npm run | grep -q "^  build"; then npm run build; fi

      # --- Sentinel Shield raw reports (best-effort; for normalization) ---
      # npm audit --json maps to the npm_audit collector. tests.json must be a
      # normalized { "failures": N, "errors": N } from your test runner (not faked).
      # ESLint/TypeScript do not yet have collectors; do not invent unsupported ones.
      - name: Sentinel Shield raw reports
        if: always()
        run: |
          mkdir -p reports/raw
          npm audit --json > reports/raw/npm-audit.json 2>/dev/null || true
          # Example for later: normalize your test runner output to reports/raw/tests.json
          #   e.g. { "failures": 0, "errors": 0 }
          echo "raw Node reports written (where available):"
          ls -1 reports/raw 2>/dev/null || true

      - name: Upload raw Node reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sentinel-shield-raw-security-node
          path: reports/raw/*.json
          retention-days: 90
          if-no-files-found: warn
