# Sentinel Shield — OWASP ZAP dynamic scan (STAGING ONLY).
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
#
# IMPORTANT: This template is for a non-production staging target. Do NOT point
# active/full scans at production by default. A baseline (passive) scan is the
# default; the full (active) scan is gated to scheduled nightly runs against
# staging only.
#
# CONFIGURE BEFORE IT DOES ANYTHING: set the repository/environment variable
# `STAGING_URL` (Settings > Secrets and variables > Actions > Variables, or
# scoped to the `staging` environment) to the full staging URL, e.g.
# `https://staging.example.com`. Until it is set, the nightly full-scan job is
# SKIPPED — it does not run with an empty target and it does not create a
# (permanently red) `staging` deployment. This is the exact failure the previous
# revision hit: `zap-full-scan.py -t` with an unset `STAGING_URL` errored with
# "Target must start with 'http://'" (exit 3) on every nightly run.
name: ci-zap

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Staging URL to scan (must NOT be production)"
        required: true
  schedule:
    - cron: "0 2 * * *"   # nightly full scan against staging

permissions:
  contents: read

# Serialize DAST: never run two scans against the same TARGET at once, and never
# CANCEL an in-flight scan (an active scan is mid-conversation with the target;
# cancelling mid-run can leave the target in a bad state). The group must resolve
# to the actual scan target so the nightly full scan (schedule → vars.STAGING_URL)
# and a manual baseline dispatched against that same host (workflow_dispatch →
# inputs.target_url) land in ONE group and serialize. Keying on github.ref would
# NOT serialize them (schedule has no target_url input) — the whole point is
# per-target exclusion, not per-ref.
concurrency:
  group: ci-zap-${{ github.repository }}-${{ github.event.inputs.target_url || vars.STAGING_URL }}
  cancel-in-progress: false

jobs:
  zap-baseline:
    # Passive baseline scan — safe, non-intrusive. Runs on manual dispatch.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ github.event.inputs.target_url }}
          cmd_options: "-a"
          # Report-only: surface findings in the run/artifact, never fail the job
          # or write GitHub issues (this workflow only grants `contents: read`, so
          # issue-writing would itself error).
          fail_action: false
          allow_issue_writing: false

  zap-full:
    # Active full scan — intrusive. NIGHTLY ONLY, against the configured staging
    # environment. Never enable for production. SKIPPED when STAGING_URL is unset
    # so an unconfigured repo never runs an empty-target scan or reds `staging`.
    if: github.event_name == 'schedule' && vars.STAGING_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: staging   # protected environment; reviewers/secrets scoped to staging
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ZAP full scan (staging)
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c # v0.13.0
        with:
          target: ${{ vars.STAGING_URL }}   # repository/environment variable, staging only
          cmd_options: "-a"
          # Report-only: a full scan surfaces alerts and would otherwise fail the
          # deploy; findings go to the artifact/log instead. No issue-writing (no
          # `issues: write` granted).
          fail_action: false
          allow_issue_writing: false
