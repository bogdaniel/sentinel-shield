# Sentinel Shield — OWASP ZAP dynamic scan (STAGING ONLY).
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
#
# IMPORTANT: This template is for a non-production staging target. Do NOT point
# active/full scans at production by default. A baseline (passive) scan is the
# default; the full (active) scan is gated to scheduled nightly runs against
# staging only.
name: ci-zap

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Staging URL to scan (must NOT be production)"
        required: true
  schedule:
    - cron: "0 2 * * *"   # nightly full scan against staging

permissions:
  contents: read

# Serialize DAST: never run two scans against the same TARGET at once, and never
# CANCEL an in-flight scan (an active scan is mid-conversation with the target;
# cancelling mid-run can leave the target in a bad state). The group must resolve
# to the actual scan target so the nightly full scan (schedule → vars.STAGING_URL)
# and a manual baseline dispatched against that same host (workflow_dispatch →
# inputs.target_url) land in ONE group and serialize. Keying on github.ref would
# NOT serialize them (schedule has no target_url input) — the whole point is
# per-target exclusion, not per-ref.
concurrency:
  group: ci-zap-${{ github.repository }}-${{ github.event.inputs.target_url || vars.STAGING_URL }}
  cancel-in-progress: false

jobs:
  zap-baseline:
    # Passive baseline scan — safe, non-intrusive. Runs on manual dispatch.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@66042c8e7e24680119199a017e5b0e8603bf4dae # v0.12.0
        with:
          target: ${{ github.event.inputs.target_url }}
          # Fail only on confirmed alerts; tune the rules file to your app.
          cmd_options: "-a"

  zap-full:
    # Active full scan — intrusive. NIGHTLY ONLY, against the configured staging
    # environment. Never enable for production.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: staging   # protected environment; reviewers/secrets scoped to staging
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ZAP full scan (staging)
        uses: zaproxy/action-full-scan@d2a07475d467566c9a3e3c700f31f47724aa1060 # v0.10.0
        with:
          target: ${{ vars.STAGING_URL }}   # repository/environment variable, staging only
          cmd_options: "-a"
