# Fixture: NEGATIVE — no top-level concurrency: group (superseded runs pile up
# instead of cancelling). Must trip the workflow-concurrency check. Otherwise
# compliant.
name: fixture-missing-concurrency

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
