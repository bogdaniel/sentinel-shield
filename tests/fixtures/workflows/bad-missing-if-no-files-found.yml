# Fixture: NEGATIVE — an actions/upload-artifact step without if-no-files-found
# (silently uploads nothing if the producer is broken). Must trip the
# upload-artifact-if-no-files-found check. Everything else compliant.
name: fixture-missing-inff

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: fixture-missing-inff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reports
          path: reports/**
