# Fixture: NEGATIVE — no workflow-level permissions AND the job declares none.
# Must trip the job-permissions check. Everything else compliant.
name: fixture-missing-permissions

on:
  pull_request:

concurrency:
  group: fixture-missing-permissions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
