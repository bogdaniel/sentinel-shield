# Fixture: NEGATIVE — pull_request_target exposing a custom secret to fork code.
# Must trip merge-safety check 'pull-request-target-secret'. Everything else clean.
name: fixture-ppt-secret
on:
  pull_request_target:
permissions:
  contents: read
concurrency:
  group: fixture-ppt-secret-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout base (no head ref)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Use a custom secret (UNSAFE under ppt)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: echo "using token"
