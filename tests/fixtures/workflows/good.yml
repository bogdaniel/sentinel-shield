# violations for this file (positive control for tests/prod/220).
name: fixture-good

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: fixture-good-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
