# Sentinel Shield — consuming-project pipeline (Laravel + React + Docker).
#
# === MANAGED BY SENTINEL SHIELD (profile: laravel-react-docker) ===
# Installed/updated by scripts/install-baseline.sh / sync-baseline.sh from
# templates/workflows/sentinel-shield.yml. Re-sync with `sync-baseline.sh --apply --force`.
# Project-local edits will be overwritten on sync — keep project specifics in
# .sentinel-shield/profile.yaml + .sentinel-shield/accepted-risks.json instead.
#
# Adapted from Sentinel Shield's combined reference pipeline (ci-pipeline.yml).
# SOURCE STRATEGY: Option B — Sentinel Shield is checked out into tools/sentinel-shield
# and its scripts are called from there (central updates, pinned version).
#   1. Set SENTINEL_SHIELD_REPOSITORY to your Sentinel Shield repository.
#   2. Pin SENTINEL_SHIELD_REF to a tag or full commit SHA (NOT a moving branch).
#   3. If Sentinel Shield is a PRIVATE repo, add a token/deploy key to the checkout
#      steps (e.g. `token: ${{ secrets.SENTINEL_SHIELD_RO_TOKEN }}`).
# Fallback (Option A): vendor scripts/ schemas/ templates/ into the project and
# replace `${{ env.SENTINEL_SHIELD_PATH }}/scripts` paths with the vendored location.
#
# ACTION PINNING: `uses:` shows version tags for readability. Pin ALL third-party
# actions to verified commit SHAs before production. Do not use pull_request_target.
name: sentinel-shield

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sentinel-shield-${{ github.ref }}
  cancel-in-progress: true

env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO: set your Sentinel Shield repository
  # v0.1.0 is acceptable for first adoption; pin to a FULL COMMIT SHA before production.
  SENTINEL_SHIELD_REF: v0.1.0
  SENTINEL_SHIELD_PATH: tools/sentinel-shield

jobs:
  # --------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.meta.outputs.project_name }}
      project_type: ${{ steps.meta.outputs.project_type }}
      criticality: ${{ steps.meta.outputs.criticality }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout Sentinel Shield
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Resolve project metadata
        id: meta
        run: |
          set -eu
          mkdir -p reports
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh \
            --profile .sentinel-shield/profile.yaml --format env --output-dir reports || true
          ENVF=reports/sentinel-shield-gates.env
          get() { grep -E "^$1=" "$ENVF" 2>/dev/null | head -n1 | sed "s/^$1=//" || true; }
          PN=$(get SENTINEL_SHIELD_PROJECT_NAME); [ -n "$PN" ] || PN="${GITHUB_REPOSITORY##*/}"
          PT=$(get SENTINEL_SHIELD_PROJECT_TYPE); [ -n "$PT" ] || PT="laravel-react-docker"
          CR=$(get SENTINEL_SHIELD_PROJECT_CRITICALITY)
          case "$CR" in low|medium|high|critical) ;; *) CR="high" ;; esac
          {
            echo "project_name=$PN"
            echo "project_type=$PT"
            echo "criticality=$CR"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve gates (all formats) for the artifact
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh \
            --profile .sentinel-shield/profile.yaml --output-dir reports --format all
      - name: Upload gate resolution
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-gate-resolution
          path: |
            reports/sentinel-shield-gates.env
            reports/sentinel-shield-gates.json
            reports/sentinel-shield-gates.md
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  php-quality:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          # Add the extensions your app needs so composer install + Larastan boot.
          extensions: intl, gd, zip, bcmath, mbstring, pdo_pgsql, redis, sockets
      - name: Checkout Sentinel Shield (PHPStan runner + test adapter)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: PHP raw reports (best-effort)
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG: "false"
          SENTINEL_SHIELD_PHPSTAN_MEMORY_LIMIT: 4G
          SENTINEL_SHIELD_PHPSTAN_CONFIG: phpstan.neon
          SENTINEL_SHIELD_PHPSTAN_PATHS: app,Modules,routes,config
        run: |
          set -eu
          mkdir -p reports/raw
          if [ ! -f composer.json ]; then
            echo "::warning::no composer.json; skipping PHP (builder marks tools unavailable)"
            exit 0
          fi
          composer install --no-interaction --no-progress --prefer-dist --no-scripts || true
          [ -f .env ] || cp .env.example .env 2>/dev/null || true
          # Dependency advisories + test suite (project tools). Each writes JSON / JUnit even
          # on findings; never abort the job on findings (the gate decides later).
          composer audit --format=json > reports/raw/composer-audit.json 2>/dev/null || true
          php artisan test --log-junit reports/raw/phpunit.xml 2>/dev/null || true
          # PHPStan via the UPSTREAM Sentinel Shield runner (measures type_errors; honors
          # phpstan.neon + phpstan-baseline.neon; writes reports/raw/phpstan.json or leaves
          # it 'unavailable' with debug logs — NEVER a fake clean report).
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/runners/laravel-phpstan.sh || true
          # Normalize PHPUnit JUnit -> reports/raw/tests.json via the UPSTREAM adapter.
          if [ -f reports/raw/phpunit.xml ]; then
            php ${{ env.SENTINEL_SHIELD_PATH }}/scripts/adapters/phpunit-to-tests-json.php reports/raw/phpunit.xml reports/raw/tests.json || true
          fi
          ls -1 reports/raw 2>/dev/null || true
      - name: Upload PHP raw reports
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-raw-security-php
          path: reports/raw/*.json
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  node-quality:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Checkout Sentinel Shield (Vitest test adapter)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Node raw reports (best-effort)
        run: |
          set -eu
          mkdir -p reports/raw
          if [ ! -f package.json ]; then
            echo "::warning::no package.json; skipping Node (builder marks tools unavailable)"
            exit 0
          fi
          npm ci || true
          npm audit --json > reports/raw/npm-audit.json 2>/dev/null || true
          # Tests: run your runner with JSON output, then normalize via the UPSTREAM adapter.
          # Vitest example (Jest: use jest-to-tests-json.mjs). Do NOT fake tests.json — if no
          # runner is wired, tests stay 'unavailable'.
          npx --no-install vitest run --reporter=json --outputFile=reports/raw/node-tests.json 2>/dev/null || true
          if [ -f reports/raw/node-tests.json ]; then
            node ${{ env.SENTINEL_SHIELD_PATH }}/scripts/adapters/vitest-to-tests-json.mjs reports/raw/node-tests.json reports/raw/tests.json || true
          fi
          ls -1 reports/raw 2>/dev/null || true
      - name: Upload Node raw reports
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-raw-security-node
          path: reports/raw/*.json
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  docker-security:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout Sentinel Shield (for the Hadolint runner script)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Detect Docker files
        id: detect
        run: |
          set -eu
          mkdir -p reports/raw
          if [ -f Dockerfile ] || [ -f docker-compose.yml ] || [ -f compose.yml ] || [ -f compose.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::no Docker files; skipping Docker security"
          fi
      - name: Hadolint (all Dockerfiles → reports/raw/hadolint.json)
        # v0.1.7: global multi-Dockerfile discovery from Sentinel Shield — scans
        # Dockerfile, Dockerfile.*, docker/**, .docker/** and merges into one report.
        # This REPLACES any project-local multi-Dockerfile workaround; do not re-add
        # custom Hadolint logic here. Self-skips when no Dockerfiles exist.
        if: steps.detect.outputs.present == 'true'
        run: sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/run-hadolint.sh
      - name: Docker base-image digest audit (→ reports/raw/docker-base-digest.json)
        # v0.1.9 detector, v0.1.10 enforced via finding-scope (rule_id SS_DOCKER_BASE_DIGEST,
        # distinct from DL3018/DL3008). Contributes to unsafe_docker.
        if: steps.detect.outputs.present == 'true'
        run: sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audit-docker-base-digest.sh --output reports/raw/docker-base-digest.json
      - name: GitHub Actions pin audit (→ reports/raw/github-actions-pins.json)
        # v0.1.9: flags unpinned uses:/images in .github/workflows -> unsafe_github_actions
        # (complementary to actionlint/zizmor). Should be 0 once refs are SHA/digest-pinned.
        run: sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audit-github-actions-pins.sh --output reports/raw/github-actions-pins.json
      - name: Trivy filesystem (JSON)
        if: steps.detect.outputs.present == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/raw/trivy.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
      - name: Upload Docker raw reports
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-raw-security-docker
          path: reports/raw/*.json
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  security-scan:
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout Sentinel Shield (for bundled Semgrep rules)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Prepare dirs
        run: mkdir -p reports/raw
      - name: Semgrep (JSON)
        # -w /src runs Semgrep from the repo root so the project-local .semgrepignore
        # (vendored/generated assets, e.g. public/js/filament) is honored. SAST only —
        # composer/npm audit, Trivy, Syft, Gitleaks, Hadolint are unaffected.
        # Pin the image to a digest before production.
        run: |
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep:1.165.0 \
            semgrep --json --output /src/reports/raw/semgrep.json \
            --config /src/${{ env.SENTINEL_SHIELD_PATH }}/semgrep/app || true
        continue-on-error: true
      - name: Third-party suspicious-code scan (SEPARATE channel)
        # Supply-chain SAST over dependency/vendored code ONLY -> SEPARATE artifact
        # (third-party-semgrep.json), high-confidence rules only. Skips when no
        # dependency dirs exist (e.g. a minimal fixture). NOT a replacement for Trivy/
        # composer audit/npm audit/Gitleaks/SBOM. See docs/security/sentinel-shield-adoption.md.
        # Each dep dir is mounted under a neutral name (/scan/depN) so Semgrep's
        # built-in node_modules/vendor ignore + git-only discovery do not skip it;
        # minified/build output excluded. To run the broad/experimental rules for a
        # focused audit, add --config .../semgrep/supply-chain/third-party-experimental.
        run: |
          mkdir -p reports/raw
          MOUNTS=""; SCANT=""; i=0
          for d in vendor node_modules public/vendor public/js/filament; do
            if [ -d "$d" ]; then i=$((i+1)); MOUNTS="$MOUNTS -v $PWD/$d:/scan/dep$i:ro"; SCANT="$SCANT /scan/dep$i"; fi
          done
          if [ -z "$SCANT" ]; then
            echo "No dependency dirs present; skipping third-party scan (collector marks unavailable)."
            exit 0
          fi
          docker run --rm -v "$PWD:/src" $MOUNTS --entrypoint sh semgrep/semgrep:1.165.0 -c \
            "cd /tmp && semgrep --json --output /src/reports/raw/third-party-semgrep.json \
              --config /src/${{ env.SENTINEL_SHIELD_PATH }}/semgrep/supply-chain/third-party \
              --exclude='*.min.js' --exclude='dist' --exclude='build' --exclude='coverage' $SCANT" || true
        continue-on-error: true
      - name: Gitleaks (JSON)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.18.4 \
            detect --source=/repo --report-format json \
            --report-path /repo/reports/raw/gitleaks.json --redact || true
        continue-on-error: true
      - name: Trivy filesystem (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/raw/trivy.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
      - name: SBOM (SPDX → reports/sbom.spdx.json)
        # If skipped/failed, missing_sbom stays true and strict/regulated fail later.
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: reports/sbom.spdx.json
        continue-on-error: true
      - name: Upload generic raw reports
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-raw-security
          path: reports/raw/*.json
          retention-days: 30
          if-no-files-found: warn
      - name: Upload SBOM
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-sbom
          path: reports/sbom.spdx.json
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  build-security-summary:
    needs: [prepare, php-quality, node-quality, docker-security, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout Sentinel Shield
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Prepare dirs
        run: mkdir -p reports/raw
      - name: Download all raw artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sentinel-shield-raw-security*
          path: reports/raw
          merge-multiple: true
        continue-on-error: true
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sentinel-shield-sbom
          path: reports
        continue-on-error: true
      - name: Build security summary
        env:
          PROJECT_NAME: ${{ needs.prepare.outputs.project_name }}
          PROJECT_TYPE: ${{ needs.prepare.outputs.project_type }}
          CRITICALITY: ${{ needs.prepare.outputs.criticality }}
        run: |
          set -eu
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh \
            --project-name "${PROJECT_NAME}" \
            --project-type "${PROJECT_TYPE}" \
            --criticality "${CRITICALITY}" \
            --commit "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}" \
            --workflow "${GITHUB_WORKFLOW}"
      - name: Upload security summary
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-security-summary
          path: reports/security-summary.json
          retention-days: 30
          if-no-files-found: error
      - name: Upload merged raw artifacts
        if: always()   # evidence-only: scanner failure/findings must NOT erase raw reports
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-raw-security-merged
          path: reports/raw/*.json
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  release-gate:
    needs: [prepare, build-security-summary]
    runs-on: ubuntu-latest
    # environment: production   # uncomment to require reviewers for tag/release gating
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout Sentinel Shield
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Prepare dirs
        run: mkdir -p reports
      - name: Download security summary
        uses: actions/download-artifact@v4
        with:
          name: sentinel-shield-security-summary
          path: reports
      - name: Download raw reports (finding-scope unsafe_docker matching)
        # v0.1.10: enforce-gates.sh matches unsafe_docker findings against the raw reports
        # (reports/raw/hadolint.json + reports/raw/docker-base-digest.json). Without them,
        # finding-scope records cannot match and the gate fails closed. Best-effort.
        uses: actions/download-artifact@v4
        with:
          pattern: sentinel-shield-raw-security*
          path: reports/raw
          merge-multiple: true
        continue-on-error: true
      - name: Resolve gates
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh \
            --profile .sentinel-shield/profile.yaml --output-dir reports --format all
      - name: Apply fallback policy
        # report-only: tolerates a missing summary; baseline+ require a real one.
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/select-security-summary.sh \
            --summary reports/security-summary.json \
            --example ${{ env.SENTINEL_SHIELD_PATH }}/templates/security-summary.example.json \
            --gates-env reports/sentinel-shield-gates.env
      - name: Enforce gates
        # exit 0 pass / 1 fail / 2 config — this IS the release gate.
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/enforce-gates.sh \
            --gates-env reports/sentinel-shield-gates.env \
            --summary reports/security-summary.json \
            --output-dir reports --format all
      - name: Assemble release evidence
        if: always()
        run: |
          set -eu
          mkdir -p reports
          if [ -f reports/release-evidence.md ]; then
            echo "Using project-provided reports/release-evidence.md"
          elif [ -f docs/security/release-evidence-template.md ]; then
            # report-only/baseline: generate a rollup from the template if none exists.
            cp docs/security/release-evidence-template.md reports/release-evidence.md
          fi
          {
            echo ""
            echo "## Sentinel Shield enforcement rollup"
            echo "- Commit: ${{ github.sha }}"
            echo "- Run: ${{ github.run_id }}"
            echo ""
            [ -f reports/sentinel-shield-enforcement.md ] && cat reports/sentinel-shield-enforcement.md
          } >> reports/release-evidence.md
      # NOTE: the resolved gates are uploaded once by the `prepare` job as
      # `sentinel-shield-gate-resolution`. upload-artifact@v4 forbids two jobs
      # uploading the same artifact name in one run, so this job does not re-upload
      # it (it re-resolves locally only to drive select/enforce).
      - name: Upload enforcement
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-enforcement
          path: |
            reports/sentinel-shield-enforcement.json
            reports/sentinel-shield-enforcement.md
          retention-days: 30
          if-no-files-found: warn
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-release-evidence
          path: reports/release-evidence.md
          retention-days: 30
          if-no-files-found: warn
      - name: Gate summary
        if: always()
        run: |
          {
            echo "## Sentinel Shield Release Gate"
            echo "- Ref: ${{ github.ref }}"
            echo ""
            [ -f reports/sentinel-shield-enforcement.md ] && cat reports/sentinel-shield-enforcement.md
          } >> "$GITHUB_STEP_SUMMARY"
