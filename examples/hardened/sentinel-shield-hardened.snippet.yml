# Sentinel Shield — HARDENED digest-pinned reference (v0.1.28).
#
# Policy (docs/scanner-image-digest-pinning.md):
#   development / onboarding  -> readable tags  (legible, easy to bump)
#   production / hardened     -> digest-pinned  (reproducible, tamper-evident)
#
# This snippet shows the production form: every scanner image and Action is pinned by @sha256.
# Digests re-verified 2026-06-15 (all MATCH prior records). To roll back, keep the previous
# @sha256 — digests are immutable, so the exact validated image is always retrievable even if the
# tag moves. On a digest MISMATCH at pull time, the gate fails closed — investigate before bumping.
#
# This is an EXAMPLE snippet (not a runnable workflow). Copy the pinned refs into your consumer
# workflow's scanner steps / env. Do NOT use floating/mutable tags in production — pin every image
# by digest, Dependency-Check included.

env:
  # Scanner container images — production: pin by digest, never a floating/mutable tag.
  SENTINEL_SHIELD_DEPENDENCY_CHECK_IMAGE: owasp/dependency-check@sha256:ad169904106250816059f113d374d63a49a7cb0fd2c5e476d05c4fb814cc77b9
  SENTINEL_SHIELD_SEMGREP_IMAGE:          semgrep/semgrep@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b
  SENTINEL_SHIELD_GRYPE_IMAGE:            anchore/grype@sha256:7a9fc7f89ccef78ae5a7691a115d3f0d41b1f319d589dd8cc1dcb9ab3f01dd28
  SENTINEL_SHIELD_DOCKLE_IMAGE:           goodwithtech/dockle@sha256:eade932f793742de0aa8755406c7677cd7696f8675b6180926f7eeffa7abe6b9

  # Optional TRANSITIVE Dependency-Check surface (v1.1.0; default OFF). Hardened production setups that
  # want full transitive CVE coverage enable these (public deps; a private registry needs consumer auth).
  SENTINEL_SHIELD_DEPENDENCY_CHECK_INSTALL_PHP:  "true"
  SENTINEL_SHIELD_DEPENDENCY_CHECK_INSTALL_NODE: "true"

# GitHub Actions — production: pin by commit SHA (the comment records the human-readable version).
# Action pins refreshed to match the engine's current CI-verified pins (checkout v7, upload-artifact
# v7, osv-scanner v2.3.8) so this reference does not regress consumers to older major versions.
hardened_action_pins:
  - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0       # v7.0.0
  - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
  - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
  - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
  - uses: anchore/sbom-action@d8a2c0130026bf585de5c176ab8f7ce62d75bf04       # v0.20.7

# -----------------------------------------------------------------------------
# v1.4.0 — operational hardening block (additive; EXAMPLE, opt-in).
# These are workflow-level hardening defaults for production/regulated adopters.
# They do NOT change Sentinel Shield's engine or default onboarding — copy what
# you need into your consumer workflow. Nothing here is forced on any user.
# -----------------------------------------------------------------------------

# Least-privilege token: grant only what the gate needs; add scopes per step, not globally.
hardened_permissions:
  permissions:
    contents: read            # checkout
    security-events: write    # SARIF upload (CodeQL), if used
    actions: read
    # id-token: write         # only if using OIDC/keyless

# Cancel superseded runs on the same ref so stale gates do not race the latest commit.
hardened_concurrency:
  concurrency:
    group: sentinel-shield-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# Bound every scanner job so a hung container (e.g. a cold NVD pull) cannot run forever.
hardened_job_limits:
  timeout-minutes: 30         # tune per gate; Dependency-Check nightly may need more

# Always upload evidence even on gate failure; keep it long enough for audit, not forever.
hardened_artifacts:
  upload:
    if: always()              # never lose the raw report when the gate fails
    retention-days: 30        # audit window; raise for regulated retention policy

# Branch protection (set in repo settings, not the workflow): require the PR-fast gate to pass,
# require review, disallow force-push to the default branch. Rollback: digests are immutable, so
# pinning the previous @sha256 restores the exact validated image even if a tag moves.
# Cache reset: clear the NVD cache namespace if Dependency-Check hits an H2 lock
# (see ../../docs/dependency-check-ci-cache.md). NVD key: store as a repo secret, rotate per
# ../../docs/security-hygiene.md — never inline it here.
