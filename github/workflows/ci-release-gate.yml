# Sentinel Shield — Release gate aggregator.
#
# ACTION PINNING: `uses:` shows version tags for readability. Per
# docs/github-actions-security.md, pin third-party actions to a full commit SHA
# in sensitive (deploy/release) workflows before production use.
#
# Flow: resolve -> provide summary -> enforce.
#   1. scripts/resolve-gates.sh reads .sentinel-shield/profile.yaml and writes the
#      resolved SENTINEL_SHIELD_FAIL_ON_* flags.
#   2. A normalized findings document, reports/security-summary.json, is provided.
#      Real scanner workflows (ci-security.yml, ci-php.yml, ci-node.yml,
#      ci-docker.yml) MUST produce it from their outputs — see
#      docs/security-summary-schema.md. If absent, this template falls back to the
#      all-zero EXAMPLE (clearly marked, NOT real evidence) so the workflow runs.
#   3. scripts/enforce-gates.sh maps the resolved flags onto the summary and exits
#      0 (pass) / 1 (fail) / 2 (config error). Its exit code IS the release gate.
#
# This job does NOT re-run scanners and does not pretend to. It enforces the
# normalized contract; producing that contract is the scanner workflows' job.
name: ci-release-gate

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      mode:
        description: "Force adoption mode (overrides profile gates.mode)"
        required: false
        default: ""
        type: choice
        options: ["", report-only, baseline, strict, regulated]

permissions:
  contents: read

concurrency:
  group: ci-release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    environment: production   # protected: require reviewers before this gate releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve gates from profile
        run: |
          set -eu
          # Locate the resolver whether Sentinel Shield is vendored at repo root
          # (scripts/) or under .sentinel-shield/scripts/ (install-baseline layout).
          RESOLVER=scripts/resolve-gates.sh
          if [ ! -f "$RESOLVER" ]; then RESOLVER=.sentinel-shield/scripts/resolve-gates.sh; fi
          if [ ! -f "$RESOLVER" ]; then
            echo "::error::resolve-gates.sh not found (expected scripts/ or .sentinel-shield/scripts/)"
            exit 1
          fi
          MODE_ARG=""
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            MODE_ARG="--mode ${{ github.event.inputs.mode }}"
          fi
          # No --require-profile: a project without a profile resolves to report-only.
          sh "$RESOLVER" $MODE_ARG --output-dir reports --format all

      - name: Upload resolved gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-gates
          path: |
            reports/sentinel-shield-gates.env
            reports/sentinel-shield-gates.json
            reports/sentinel-shield-gates.md
          retention-days: 90
          if-no-files-found: error

      - name: Provide security summary
        run: |
          set -eu
          # The normalized findings contract. In a real pipeline, the scanner
          # workflows (ci-security.yml, ci-php.yml, ci-node.yml, ci-docker.yml)
          # MUST produce reports/security-summary.json from their outputs (see
          # docs/security-summary-schema.md). If none was produced, we fall back to
          # the all-zero EXAMPLE so this template runs — but this is clearly marked
          # and must NOT be relied on as real evidence.
          if [ -f reports/security-summary.json ]; then
            echo "Using scanner-produced reports/security-summary.json"
          else
            echo "::warning::No reports/security-summary.json from scanners; using the"
            echo "::warning::all-zero EXAMPLE template. This is NOT real evidence — wire"
            echo "::warning::real scanner output per docs/security-summary-schema.md."
            EXAMPLE=templates/security-summary.example.json
            if [ ! -f "$EXAMPLE" ]; then EXAMPLE=.sentinel-shield/templates/security-summary.example.json; fi
            cp "$EXAMPLE" reports/security-summary.json
          fi

      - name: Enforce gates
        run: |
          set -eu
          ENFORCER=scripts/enforce-gates.sh
          if [ ! -f "$ENFORCER" ]; then ENFORCER=.sentinel-shield/scripts/enforce-gates.sh; fi
          if [ ! -f "$ENFORCER" ]; then
            echo "::error::enforce-gates.sh not found (expected scripts/ or .sentinel-shield/scripts/)"
            exit 1
          fi
          # enforce-gates.sh exits: 0 pass, 1 fail, 2 config/input error.
          # Its non-zero exit fails this job — that IS the release gate.
          sh "$ENFORCER" \
            --gates-env reports/sentinel-shield-gates.env \
            --summary reports/security-summary.json \
            --output-dir reports --format all

      - name: Upload enforcement artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-shield-enforcement
          path: |
            reports/security-summary.json
            reports/sentinel-shield-enforcement.json
            reports/sentinel-shield-enforcement.md
          retention-days: 90
          if-no-files-found: warn

      - name: Gate summary
        if: always()
        run: |
          {
            echo "## Sentinel Shield Release Gate"
            echo "- Ref: ${{ github.ref }}"
            echo ""
            if [ -f reports/sentinel-shield-enforcement.md ]; then
              cat reports/sentinel-shield-enforcement.md
            elif [ -f reports/sentinel-shield-gates.md ]; then
              cat reports/sentinel-shield-gates.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
