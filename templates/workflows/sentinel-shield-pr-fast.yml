# Sentinel Shield — PR FAST GATE (v0.1.12). Fast, deterministic, no external target scanning.
# === MANAGED BY SENTINEL SHIELD === installed/synced via install-baseline.sh / sync-baseline.sh.
# Tools ACTUALLY run by this workflow: php -l, PHPStan, npm audit, Semgrep (curated),
# Hadolint, GH Actions pin audit, Docker base digest, dependency policy. Psalm/Pint/ESLint/
# tsc run ONLY if the steps below are wired for a configured project.
# NOTE: Gitleaks (secrets), actionlint and zizmor are NOT run here — they run in the separate
# security workflow (ci-security.yml). This PR-fast gate is NOT the secrets gate.
# Enforces the project's profile mode.
name: sentinel-shield-pr-fast
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
# Cancel superseded PR-fast runs when new commits arrive on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO set
  SENTINEL_SHIELD_REF: v2.0.1                            # pin to a full SHA before production
  SENTINEL_SHIELD_PATH: tools/sentinel-shield
  # Semgrep scanner image — readable tag by default; pin by digest in production (see
  # docs/scanner-image-digest-pinning.md). Override with the digest form to harden supply chain:
  SENTINEL_SHIELD_SEMGREP_IMAGE: semgrep/semgrep:1.165.0   # or semgrep/semgrep@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b
jobs:
  pr-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Resolve gates
        run: sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh --profile .sentinel-shield/profile.yaml --output-dir reports --format all
      - name: PHP fast checks (best-effort; never fake)
        run: |
          mkdir -p reports/raw
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/runners/php-syntax.sh reports/raw/php-syntax.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/runners/laravel-phpstan.sh || true
          # Psalm / Pint / PHP-CS-Fixer: run if configured, write reports/raw/{psalm,php-style}.json
      - name: Node fast checks
        run: |
          npm ci || true
          npm audit --json > reports/raw/npm-audit.json 2>/dev/null || true
          # tsc --noEmit + eslint -> reports/raw/{typescript,eslint}.json
      - name: GH Actions + Docker lint + dependency policy
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/run-hadolint.sh || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audit-github-actions-pins.sh --output reports/raw/github-actions-pins.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audit-docker-base-digest.sh --output reports/raw/docker-base-digest.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/dependency-policy.sh reports/raw/dependency-policy.json . || true
      - name: Semgrep app scan — CURATED Sentinel Shield rules (NEVER --config=auto)
        # Validated on zenchron-tools (run 27170148123): curated rules produced 0 critical / 0
        # high (vs 7/16 with --config=auto) and far fewer scan errors. The project .semgrepignore
        # is honored via `-w /src`. Do NOT switch to --config=auto in production — it is noisy.
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" -w /src "${SENTINEL_SHIELD_SEMGREP_IMAGE:-semgrep/semgrep:1.165.0}" \
            semgrep --json --output /src/reports/raw/semgrep.json \
            --config /src/${{ env.SENTINEL_SHIELD_PATH }}/semgrep/app || true
          # gitleaks + actionlint + zizmor via their pinned actions/containers (see ci-security.yml)
      - name: Build summary + enforce
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh --raw-dir reports/raw --output reports/security-summary.json
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/enforce-gates.sh --summary reports/security-summary.json --gates-env reports/sentinel-shield-gates.env --output-dir reports --format all
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()   # preserve raw reports even when the gate fails on real findings
        with: { name: sentinel-shield-pr-fast, path: reports/**, retention-days: 30, if-no-files-found: warn }
