# Sentinel Shield — DEPENDENCY-CHECK EVIDENCE workflow (v0.1.22). Single-purpose: run OWASP
# Dependency-Check on a real consumer so a maintainer can produce the FIRST real
# `dependency-check.json` artifact. UNTIL that artifact exists and a collector parses it,
# Dependency-Check stays "attempted, NOT live-validated" — see docs/main-gate-live-evidence.md
# and docs/dependency-check-nightly-strategy.md. This workflow does NOT promote the tool; it only
# generates the evidence a maintainer must then download, verify, and cite.
#
# Foreground only — never `docker run -d` (a detached container ignores `timeout-minutes`). The
# audit wrapper keeps valid JSON even on non-zero exit (findings) and discards partial output;
# it NEVER fakes a clean report. Cold first run downloads the full NVD feed (slow); warm runs
# restore the monthly cache and fetch only the delta (see the cold/warm doc section).
name: sentinel-shield-dependency-check
on:
  workflow_dispatch:   # maintainer-triggered: produce a real dependency-check.json artifact
    inputs:
      install_php:
        description: "composer install before DC (TRANSITIVE PHP surface; default committed-surface only)"
        required: false
        default: "false"
      install_node:
        description: "npm ci before DC (TRANSITIVE Node surface; default committed-surface only)"
        required: false
        default: "false"
  # Optional weekly schedule — uncomment to keep the NVD cache warm and re-scan on a cadence.
  # schedule:
  #   - cron: "23 4 * * 1"   # Mondays 04:23 UTC (off-peak)
permissions:
  contents: read   # minimal — no pull_request_target, no write scopes
# Serialize evidence runs; never cancel an in-flight NVD-backed scan (it must produce the artifact).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO set
  SENTINEL_SHIELD_REF: v2.0.1                             # pin to a full SHA before production
  SENTINEL_SHIELD_PATH: tools/sentinel-shield
  # --- Transitive-scan knobs (v1.1.0; ADDITIVE, default OFF = committed-surface scan) -------------
  # Dependency-Check reads committed manifests (composer.json / package-lock.json) by default. To scan
  # the TRANSITIVE surface (vendor/ + node_modules/), set these to "true" (or dispatch with the inputs).
  # Installs are credential-free for public deps; a private registry would need consumer-provided auth
  # (NOT enabled here). Leaving them "false" preserves the v1.0.0 committed-surface behavior exactly.
  SENTINEL_SHIELD_DEPENDENCY_CHECK_INSTALL_PHP: "false"
  SENTINEL_SHIELD_DEPENDENCY_CHECK_INSTALL_NODE: "false"
  SENTINEL_SHIELD_DEPENDENCY_CHECK_PHP_COMMAND: "composer install --no-interaction --no-progress --no-scripts --ignore-platform-reqs --prefer-dist"
  SENTINEL_SHIELD_DEPENDENCY_CHECK_NODE_COMMAND: "npm ci --no-audit --no-fund --ignore-scripts"
jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # cold NVD download is slow; the scan step has its own 45m timeout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      # --- Optional TRANSITIVE surface (v1.1.0; default OFF). composer install + npm ci populate
      #     vendor/ + node_modules/ so DC sees transitive deps. continue-on-error: an install failure
      #     falls back to the committed surface (honest — never fakes coverage). NOT required by default.
      - name: composer install (optional; transitive PHP surface)
        if: ${{ inputs.install_php == 'true' || env.SENTINEL_SHIELD_DEPENDENCY_CHECK_INSTALL_PHP == 'true' }}
        continue-on-error: true
        # Expand the command through the SHELL (never ${{ }} inside run:) so a consumer who wires
        # this value from an input cannot inject workflow-template syntax — see ci-production-readiness.yml.
        run: $SENTINEL_SHIELD_DEPENDENCY_CHECK_PHP_COMMAND || echo "composer install failed — DC falls back to the committed surface"
      - name: npm ci (optional; transitive Node surface)
        if: ${{ inputs.install_node == 'true' || env.SENTINEL_SHIELD_DEPENDENCY_CHECK_INSTALL_NODE == 'true' }}
        continue-on-error: true
        # Shell expansion, not ${{ }} — same injection-hygiene reason as the composer step above.
        run: $SENTINEL_SHIELD_DEPENDENCY_CHECK_NODE_COMMAND || echo "npm ci failed — DC falls back to the committed surface"
      - name: Compute NVD cache month stamp
        id: month
        run: echo "ym=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: Restore NVD cache (monthly key; partial-reuse restore-keys)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .sentinel-shield/cache/dependency-check
          key: nvd-${{ runner.os }}-${{ steps.month.outputs.ym }}
          restore-keys: |
            nvd-${{ runner.os }}-
      - name: OWASP Dependency-Check (foreground; cached NVD; never fake)
        # FOREGROUND only — timeout-minutes + SENTINEL_SHIELD_DEPENDENCY_CHECK_TIMEOUT only work when
        # the scanner is not detached. Exits non-zero on findings; the wrapper keeps the valid JSON.
        timeout-minutes: 45
        env:
          SENTINEL_SHIELD_DEPENDENCY_CHECK_MODE: enabled
          SENTINEL_SHIELD_DEPENDENCY_CHECK_CACHE: .sentinel-shield/cache/dependency-check
          # Production: pin by digest (validated v0.1.30: owasp/dependency-check@sha256:ad169904…cc77b9).
          # Templates ship the readable tag for onboarding; override with the digest before production.
          SENTINEL_SHIELD_DEPENDENCY_CHECK_IMAGE: owasp/dependency-check:latest
          SENTINEL_SHIELD_DEPENDENCY_CHECK_TIMEOUT: 40m
          # NVD API key (v0.1.26+): raises the NVD rate limit so the first dataset pull completes (no
          # HTTP 429). Provide it as a repo secret of the SAME name. The wrapper passes it via a 0600
          # container-readable propertyfile — never on the command line, in logs, in the report, or committed.
          SENTINEL_SHIELD_DEPENDENCY_CHECK_NVD_API_KEY: ${{ secrets.SENTINEL_SHIELD_DEPENDENCY_CHECK_NVD_API_KEY }}
        run: |
          mkdir -p reports/raw
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/dependency-check.sh reports/raw/dependency-check.json || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()   # scanner failure/findings must NOT erase the raw dependency-check.json
        with: { name: sentinel-shield-dependency-check, path: reports/**, retention-days: 30, if-no-files-found: warn }
