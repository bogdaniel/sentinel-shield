# Sentinel Shield — SCHEDULED / NIGHTLY (v0.1.21). Heavier deep scans; report-only by default.
# Job `nightly`: Trivy image, Grype SBOM/fs, OpenSSF Scorecard, TruffleHog deep, Dockle.
# Job `dependency-check`: the slow NVD-backed OWASP Dependency-Check — RECOMMENDED home, with a
#   persisted monthly NVD cache (actions/cache). Foreground only; never `docker run -d` (a detached
#   container ignores step timeouts). See docs/dependency-check-nightly-strategy.md.
# Optional ZAP baseline / Nuclei on staging ONLY when a DAST target+allowlist are configured
# (see sentinel-shield-dast.yml). Report-only: scheduled scans never block merges.
name: sentinel-shield-scheduled
on:
  schedule:
    # Conservative daily run at 03:23 UTC (off-peak). Lower to weekly (e.g. "23 3 * * 1") if the
    # NVD cache rotation is enough signal — Dependency-Check findings duplicate OSV/Trivy/Grype.
    - cron: "23 3 * * *"
  workflow_dispatch:   # on-demand: warm the NVD cache or re-scan after a dependency bump
permissions:
  contents: read
# Serialize nightly/dispatch runs; never cancel an in-flight deep scan (it must finish its evidence).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO set
  SENTINEL_SHIELD_REF: v0.1.21                            # pin to a full SHA before production
  SENTINEL_SHIELD_PATH: tools/sentinel-shield
  # Digest-pinned scanner images (resolved 2026-06-10; see docs/scanner-image-digest-pinning.md).
  # Templates keep readable tags by default; override with the digest pins below before production.
  SENTINEL_SHIELD_GRYPE_IMAGE: anchore/grype:v0.114.0     # or anchore/grype@sha256:7a9fc7f89ccef78ae5a7691a115d3f0d41b1f319d589dd8cc1dcb9ab3f01dd28
  SENTINEL_SHIELD_DOCKLE_IMAGE: goodwithtech/dockle:v0.4.15 # or goodwithtech/dockle@sha256:eade932f793742de0aa8755406c7677cd7696f8675b6180926f7eeffa7abe6b9
jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Deep scans (no-op if binary absent; never fake)
        env:
          SENTINEL_SHIELD_IMAGE: ${{ vars.SENTINEL_SHIELD_IMAGE }}
          SENTINEL_SHIELD_GRYPE_MODE: fs   # nightly has no prior SBOM in this job; scan the tree
        run: |
          mkdir -p reports/raw
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/trufflehog.sh reports/raw/trufflehog.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/scorecard.sh reports/raw/scorecard.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/grype.sh reports/raw/grype.json || true
          [ -n "${SENTINEL_SHIELD_IMAGE:-}" ] && sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/dockle.sh reports/raw/dockle.json || true
      - name: Build summary (report-only; nightly does not block merges)
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh --raw-dir reports/raw --output reports/security-summary.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()   # preserve raw reports even if a scan/step fails
        with: { name: sentinel-shield-scheduled, path: reports/**, retention-days: 30, if-no-files-found: warn }

  # OWASP Dependency-Check — slow NVD-backed scan, isolated job with a persisted monthly cache.
  # PR-fast: disabled · Main: optional · Scheduled: RECOMMENDED (here). Runs FOREGROUND only.
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # cold NVD download is slow; the scan step has its own 45m timeout
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Compute NVD cache month stamp
        id: month
        run: echo "ym=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - name: Restore NVD cache (monthly key; partial-reuse restore-keys)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .sentinel-shield/cache/dependency-check
          key: nvd-${{ runner.os }}-${{ steps.month.outputs.ym }}
          restore-keys: |
            nvd-${{ runner.os }}-
      - name: OWASP Dependency-Check (foreground; cached NVD; never fake)
        # FOREGROUND only — timeout-minutes + SENTINEL_SHIELD_DEPENDENCY_CHECK_TIMEOUT only work when
        # the scanner is not detached. Exits non-zero on findings; the wrapper keeps the valid JSON.
        timeout-minutes: 45
        env:
          SENTINEL_SHIELD_DEPENDENCY_CHECK_MODE: enabled
          SENTINEL_SHIELD_DEPENDENCY_CHECK_CACHE: .sentinel-shield/cache/dependency-check
          # No validated Dependency-Check digest yet — readable tag; pin by digest before production.
          SENTINEL_SHIELD_DEPENDENCY_CHECK_IMAGE: owasp/dependency-check:latest
          SENTINEL_SHIELD_DEPENDENCY_CHECK_TIMEOUT: 40m
        run: |
          mkdir -p reports/raw
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/dependency-check.sh reports/raw/dependency-check.json || true
      - name: Build summary (report-only)
        if: always()
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh --raw-dir reports/raw --output reports/security-summary.json || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()   # scanner failure/findings must NOT erase the raw dependency-check.json
        with: { name: sentinel-shield-dependency-check, path: reports/**, retention-days: 30, if-no-files-found: warn }
