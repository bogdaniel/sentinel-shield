# Sentinel Shield — MAIN BRANCH GATE (v0.1.12). Heavier but deterministic; trusted branch.
# CodeQL, OSV-Scanner, Trivy fs, OWASP Dependency-Check, Grype, Deptrac, architecture tests,
# Syft SBOM, and IaC (Checkov/Conftest/Terrascan) when IaC present.
#
# FIRST-TIME VALIDATION (v0.1.17). This workflow is workflow_dispatch + push only, so it cannot be
# dispatched from a feature branch until it already exists on the default branch (chicken-and-egg).
# Do NOT merge it unvalidated. Validate the SAME main-gate scanners from a branch/PR first with the
# branch-safe harness (no dispatch, no merge required):
#   sh scripts/run-main-gate-validation.sh --target . --output-dir reports/raw --all
# Then build/resolve/enforce and review the real reports/raw/*. Only after that is green should this
# workflow be merged to the default branch, where workflow_dispatch/push take over. See
# docs/main-gate-validation-strategy.md.
name: sentinel-shield-main
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  security-events: write   # CodeQL upload
# Release-gate runs must complete. Group per COMMIT (not per ref) so a newer push
# never supersedes/drops a queued gate for an earlier commit — each commit is gated
# to completion; only redundant re-runs of the SAME sha dedupe, never cancelling
# an in-flight gate.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false
env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO set
  SENTINEL_SHIELD_REF: v0.1.21                            # pin to a full SHA before production
  SENTINEL_SHIELD_PATH: tools/sentinel-shield
  # Scanner images — readable tags by default; pin by digest in production
  # (see docs/scanner-image-digest-pinning.md). Override with the digest form:
  SENTINEL_SHIELD_GRYPE_IMAGE: anchore/grype:v0.114.0     # or anchore/grype@sha256:7a9fc7f89ccef78ae5a7691a115d3f0d41b1f319d589dd8cc1dcb9ab3f01dd28
jobs:
  main-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Dependency + container scanners (audit wrappers; no-op if binary absent — never fake)
        env:
          # Grype (v0.1.19): SBOM-first by default — point it at the Syft SBOM produced above.
          SENTINEL_SHIELD_GRYPE_MODE: sbom
          SENTINEL_SHIELD_GRYPE_SBOM_PATH: reports/sbom.spdx.json
          # SENTINEL_SHIELD_GRYPE_IMAGE: anchore/grype@sha256:...   # set for container execution
          # Dependency-Check is DISABLED by default (slow NVD download); enable on the nightly job.
          SENTINEL_SHIELD_DEPENDENCY_CHECK_MODE: disabled
        run: |
          mkdir -p reports/raw
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/osv-scanner.sh reports/raw/osv-scanner.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/grype.sh reports/raw/grype.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/dependency-check.sh reports/raw/dependency-check.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/checkov.sh reports/raw/checkov.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/conftest.sh reports/raw/conftest.json || true
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/audits/terrascan.sh reports/raw/terrascan.json || true
          # CodeQL via github/codeql-action; export SARIF -> reports/raw/codeql.json
          # Syft SBOM -> reports/sbom.spdx.json ; Deptrac -> reports/raw/deptrac.json
      - name: Build summary + enforce
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh --profile .sentinel-shield/profile.yaml --output-dir reports --format all
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh --raw-dir reports/raw --output reports/security-summary.json
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/enforce-gates.sh --summary reports/security-summary.json --gates-env reports/sentinel-shield-gates.env --output-dir reports --format all
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()   # preserve raw reports even when the gate fails on real findings
        with: { name: sentinel-shield-main, path: reports/**, retention-days: 30, if-no-files-found: warn }
