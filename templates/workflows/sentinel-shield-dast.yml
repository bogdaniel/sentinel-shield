# Sentinel Shield — MANUAL / CONTROLLED DAST (v0.1.12). NOT a PR check. workflow_dispatch only.
# OWASP ZAP baseline/full + Nuclei. FAIL CLOSED without an allowlisted target. NEVER scans an
# arbitrary target. Requires a completed templates/dast-scan-approval.md + nuclei-target-allowlist.md.
name: sentinel-shield-dast
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (must match the allowlisted host)"
        required: true
      allowed_host:
        description: "Allowlisted host (exact)"
        required: true
      scan:
        description: "zap-baseline | zap-full | nuclei"
        required: true
        default: zap-baseline
permissions:
  contents: read
# Serialize controlled scans against the same ref; never cancel an in-flight approved scan.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO set
  SENTINEL_SHIELD_REF: v2.0.1                            # pin to a full SHA before production
  SENTINEL_SHIELD_PATH: tools/sentinel-shield
jobs:
  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SENTINEL_SHIELD_DAST_TARGET_URL: ${{ inputs.target_url }}
      SENTINEL_SHIELD_DAST_ALLOWED_HOST: ${{ inputs.allowed_host }}
      # Pass user input via env (NOT inline ${{ }}) so it cannot be injected into the run shell.
      SENTINEL_SHIELD_DAST_SCAN: ${{ inputs.scan }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Run controlled DAST (guard fails closed on host mismatch)
        run: |
          mkdir -p reports/raw
          case "${SENTINEL_SHIELD_DAST_SCAN}" in
            zap-baseline) sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/runners/zap-baseline.sh reports/raw/zap.json ;;
            zap-full)     sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/runners/zap-full.sh reports/raw/zap-full.json ;;
            nuclei)       sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/runners/nuclei.sh reports/raw/nuclei.json ;;
            *) echo "unknown scan"; exit 2 ;;
          esac
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()   # preserve DAST reports even if a scan step errors
        with: { name: sentinel-shield-dast, path: reports/**, retention-days: 30, if-no-files-found: warn }
