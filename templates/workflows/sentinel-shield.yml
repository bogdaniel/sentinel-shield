# Sentinel Shield — consuming-project pipeline (profile-driven, v2).
#
# === MANAGED BY SENTINEL SHIELD ===
# Installed/updated by scripts/install-baseline.sh / sync-baseline.sh from
# templates/workflows/sentinel-shield.yml. Re-sync with `sync-baseline.sh --apply --force`.
# Project-local edits will be overwritten on sync — keep project specifics in
# .sentinel-shield/profile.yaml + .sentinel-shield/tool-policy.yaml + accepted-risks.json.
#
# TOOL EXECUTION IS PLAN-DRIVEN. This workflow does NOT hardcode a per-language tool
# list. It resolves the project's effective profile and runs scripts/run-tool-plan.sh
# per stage (pr / main); run-tool-plan.sh selects exactly the tools the profile says
# run this stage (policy != disabled/external, execution.<stage>==true,
# applicability!=not-applicable, the selected one-of member), invokes each runner, and
# writes reports/<stage>-execution.json. The same file therefore works for Laravel,
# Symfony, PHP libraries, JS/TS and combined profiles — the plan decides, not the YAML.
#
# RUNNERS WIRED (transitively) BY run-tool-plan.sh — listed here so the wiring is
# auditable from this template even though no step references them directly; the plan
# invokes exactly the ones the resolved profile selects for the stage:
#   scripts/runners/laravel-phpstan.sh  scripts/runners/larastan.sh
#   scripts/runners/php-syntax.sh       scripts/runners/pint.sh
#   scripts/runners/actionlint.sh       scripts/runners/zizmor.sh
#   scripts/runners/codeql-export.sh    (+ eslint/typescript/pest/phpunit/deptrac/…
#   and every other runner declared by the profile's tool policy).
#
# SOURCE STRATEGY: Option B — Sentinel Shield is checked out into tools/sentinel-shield
# and its scripts are called from there.
#   1. Set SENTINEL_SHIELD_REPOSITORY to your Sentinel Shield repository.
#   2. Pin SENTINEL_SHIELD_REF to a tag or full commit SHA (NOT a moving branch).
#   3. If Sentinel Shield is a PRIVATE repo, add a token/deploy key to the checkout steps.
#
# SUPPLY-CHAIN (Blocker 7): no scanner is installed via `curl ... | sh` and no binary is
# downloaded without verification. Scanners run from SHA-pinned actions or digest-pinnable
# container images (pin the *_IMAGE env vars by @sha256 before production). Tools that
# cannot be provisioned safely here are simply ABSENT — their runner reports them
# `unavailable` (honest-absent) and the gate decides; add your own SHA-pinned provisioning
# step if you need them to run.
#
# ACTION PINNING: every `uses:` is pinned to a full 40-hex commit SHA. Do not use tags.
# Do not use pull_request_target.
name: sentinel-shield

on:
  pull_request:
  # Blocker 10: run on push to ANY branch; the main-gate job self-gates to the repo's
  # default branch via an `if:` (below) so consumers never have to edit a hardcoded
  # branch name here.
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sentinel-shield-${{ github.ref }}
  cancel-in-progress: true

env:
  SENTINEL_SHIELD_REPOSITORY: YOUR_ORG/sentinel-shield   # TODO: set your Sentinel Shield repository
  # v0.1.0 is acceptable for first adoption; pin to a FULL COMMIT SHA before production.
  SENTINEL_SHIELD_REF: v0.1.0
  SENTINEL_SHIELD_PATH: tools/sentinel-shield
  # Scanner images — readable tags by default; pin by @sha256 digest in production
  # (docs/scanner-image-digest-pinning.md). NEVER use a `latest` tag.
  SENTINEL_SHIELD_SEMGREP_IMAGE: semgrep/semgrep:1.165.0   # or semgrep/semgrep@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b
  SENTINEL_SHIELD_GITLEAKS_IMAGE: zricethezav/gitleaks:v8.18.4   # pinned version (NOT latest); pin by @sha256 in production

jobs:
  # --------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      project_name: ${{ steps.meta.outputs.project_name }}
      profile: ${{ steps.meta.outputs.profile }}
      criticality: ${{ steps.meta.outputs.criticality }}
    steps:
      - name: Checkout project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Resolve project metadata + profile
        id: meta
        run: |
          set -eu
          mkdir -p reports
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh \
            --profile .sentinel-shield/profile.yaml --format env --output-dir reports || true
          ENVF=reports/sentinel-shield-gates.env
          get() { grep -E "^$1=" "$ENVF" 2>/dev/null | head -n1 | sed "s/^$1=//" || true; }
          PN=$(get SENTINEL_SHIELD_PROJECT_NAME); [ -n "$PN" ] || PN="${GITHUB_REPOSITORY##*/}"
          # The profile name drives the whole plan; project_type IS the profile.
          PROFILE=$(get SENTINEL_SHIELD_PROJECT_TYPE); [ -n "$PROFILE" ] || PROFILE="laravel-react-docker"
          CR=$(get SENTINEL_SHIELD_PROJECT_CRITICALITY)
          case "$CR" in low|medium|high|critical) ;; *) CR="high" ;; esac
          {
            echo "project_name=$PN"
            echo "profile=$PROFILE"
            echo "criticality=$CR"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve gates (all formats) for the artifact
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh \
            --profile .sentinel-shield/profile.yaml --output-dir reports --format all
      - name: Upload gate resolution
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentinel-shield-gate-resolution
          path: |
            reports/sentinel-shield-gates.env
            reports/sentinel-shield-gates.json
            reports/sentinel-shield-gates.md
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # PR-fast stage: produce raw scanner reports via safe/pinned infra, then run the
  # profile's PR plan and build the security summary. Report-only — never blocks here.
  pr-fast:
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROFILE: ${{ needs.prepare.outputs.profile }}
    steps:
      - name: Checkout project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: intl, gd, zip, bcmath, mbstring, pdo_pgsql, redis, sockets
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install project dependencies (best-effort) + dependency advisories
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG: "false"
        run: |
          set -eu
          mkdir -p reports/raw
          # Make the language toolchains the plan invokes (eslint/tsc/phpstan/pint/tests/…)
          # actually present; each guarded by manifest presence so non-PHP/non-JS profiles
          # simply skip. Advisory scanners (composer audit / npm audit) write their raw
          # reports here so the plan's collectors can classify them.
          if [ -f composer.json ]; then
            composer install --no-interaction --no-progress --prefer-dist --no-scripts || true
            [ -f .env ] || cp .env.example .env 2>/dev/null || true
            composer audit --format=json > reports/raw/composer-audit.json 2>/dev/null || true
          fi
          if [ -f package.json ]; then
            npm ci || true
            npm audit --json > reports/raw/npm-audit.json 2>/dev/null || true
          fi
      - name: Semgrep SAST (digest-pinnable image → reports/raw/semgrep.json)
        # -w /src honors the project-local .semgrepignore. Pin the image by @sha256 in production.
        run: |
          mkdir -p reports/raw
          docker run --rm -v "$PWD:/src" -w /src "${SENTINEL_SHIELD_SEMGREP_IMAGE}" \
            semgrep --json --output /src/reports/raw/semgrep.json \
            --config /src/${{ env.SENTINEL_SHIELD_PATH }}/semgrep/app || true
        continue-on-error: true
      - name: Gitleaks secrets (pinned image → reports/raw/gitleaks.json)
        # Pinned version (not latest); pin by @sha256 in production. secrets is a
        # non-suppressible control — keep this step.
        run: |
          mkdir -p reports/raw
          docker run --rm -v "$PWD:/repo" "${SENTINEL_SHIELD_GITLEAKS_IMAGE}" \
            detect --source=/repo --report-format json \
            --report-path /repo/reports/raw/gitleaks.json --redact || true
        continue-on-error: true
      - name: Trivy filesystem (SHA-pinned action → reports/raw/trivy-fs.json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/raw/trivy-fs.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
      - name: SBOM (SHA-pinned action → reports/sbom.spdx.json)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: reports/sbom.spdx.json
        continue-on-error: true
      - name: Run the PR tool plan (profile-driven)
        # Resolves the effective profile and runs every tool the profile says run at the
        # `pr` stage (language runners execute now that deps are installed; scanner
        # collectors classify the raw reports produced above). Writes
        # reports/pr-execution.json. Honest-absent: a tool with no safe provisioning is
        # recorded `unavailable`, never faked. report-only at this stage (|| true).
        run: |
          set -eu
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/run-tool-plan.sh \
            --profile "${PROFILE}" --target . --stage pr --output-dir reports/raw || true
      - name: Build security summary
        env:
          PROJECT_NAME: ${{ needs.prepare.outputs.project_name }}
          CRITICALITY: ${{ needs.prepare.outputs.criticality }}
        run: |
          set -eu
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh \
            --profile "${PROFILE}" --target . \
            --raw-dir reports/raw --output reports/security-summary.json \
            --project-name "${PROJECT_NAME}" \
            --project-type "${PROFILE}" \
            --criticality "${CRITICALITY}" \
            --commit "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}" \
            --workflow "${GITHUB_WORKFLOW}"
      - name: Upload PR raw reports + execution manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentinel-shield-raw-security-pr
          path: |
            reports/raw/*.json
            reports/pr-execution.json
            reports/security-summary.json
            reports/sbom.spdx.json
          retention-days: 30
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Main gate: deep (main-stage) plan + summary + enforce-gates. This IS the release
  # gate (exit 1 fails the job). Blocker 10: self-gates to the repo default branch
  # (or manual dispatch) — no hardcoded branch name.
  main-gate:
    needs: [prepare]
    if: github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # environment: production   # uncomment to require reviewers for release gating
    env:
      PROFILE: ${{ needs.prepare.outputs.profile }}
    steps:
      - name: Checkout project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout Sentinel Shield
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.SENTINEL_SHIELD_REPOSITORY }}
          ref: ${{ env.SENTINEL_SHIELD_REF }}
          path: ${{ env.SENTINEL_SHIELD_PATH }}
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: intl, gd, zip, bcmath, mbstring, pdo_pgsql, redis, sockets
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install project dependencies (best-effort) + dependency advisories
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG: "false"
        run: |
          set -eu
          mkdir -p reports/raw
          if [ -f composer.json ]; then
            composer install --no-interaction --no-progress --prefer-dist --no-scripts || true
            [ -f .env ] || cp .env.example .env 2>/dev/null || true
            composer audit --format=json > reports/raw/composer-audit.json 2>/dev/null || true
          fi
          if [ -f package.json ]; then
            npm ci || true
            npm audit --json > reports/raw/npm-audit.json 2>/dev/null || true
          fi
      - name: Semgrep SAST (digest-pinnable image → reports/raw/semgrep.json)
        run: |
          mkdir -p reports/raw
          docker run --rm -v "$PWD:/src" -w /src "${SENTINEL_SHIELD_SEMGREP_IMAGE}" \
            semgrep --json --output /src/reports/raw/semgrep.json \
            --config /src/${{ env.SENTINEL_SHIELD_PATH }}/semgrep/app || true
        continue-on-error: true
      - name: Gitleaks secrets (pinned image → reports/raw/gitleaks.json)
        run: |
          mkdir -p reports/raw
          docker run --rm -v "$PWD:/repo" "${SENTINEL_SHIELD_GITLEAKS_IMAGE}" \
            detect --source=/repo --report-format json \
            --report-path /repo/reports/raw/gitleaks.json --redact || true
        continue-on-error: true
      - name: Trivy filesystem (SHA-pinned action → reports/raw/trivy-fs.json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/raw/trivy-fs.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
      - name: SBOM (SHA-pinned action → reports/sbom.spdx.json)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: reports/sbom.spdx.json
        continue-on-error: true
      - name: Run the main tool plan (profile-driven)
        run: |
          set -eu
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/run-tool-plan.sh \
            --profile "${PROFILE}" --target . --stage main --output-dir reports/raw || true
      - name: Build security summary
        env:
          PROJECT_NAME: ${{ needs.prepare.outputs.project_name }}
          CRITICALITY: ${{ needs.prepare.outputs.criticality }}
        run: |
          set -eu
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/build-security-summary.sh \
            --profile "${PROFILE}" --target . \
            --raw-dir reports/raw --output reports/security-summary.json \
            --project-name "${PROJECT_NAME}" \
            --project-type "${PROFILE}" \
            --criticality "${CRITICALITY}" \
            --commit "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}" \
            --workflow "${GITHUB_WORKFLOW}"
      - name: Resolve gates
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/resolve-gates.sh \
            --profile .sentinel-shield/profile.yaml --output-dir reports --format all
      - name: Apply fallback policy
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/select-security-summary.sh \
            --summary reports/security-summary.json \
            --example ${{ env.SENTINEL_SHIELD_PATH }}/templates/security-summary.example.json \
            --gates-env reports/sentinel-shield-gates.env
      - name: Enforce gates
        # exit 0 pass / 1 fail / 2 config — this IS the release gate.
        run: |
          sh ${{ env.SENTINEL_SHIELD_PATH }}/scripts/enforce-gates.sh \
            --gates-env reports/sentinel-shield-gates.env \
            --summary reports/security-summary.json \
            --output-dir reports --format all
      - name: Upload main raw reports + execution manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentinel-shield-raw-security-main
          path: |
            reports/raw/*.json
            reports/main-execution.json
            reports/security-summary.json
            reports/sbom.spdx.json
          retention-days: 30
          if-no-files-found: warn
      - name: Upload enforcement
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sentinel-shield-enforcement
          path: |
            reports/sentinel-shield-enforcement.json
            reports/sentinel-shield-enforcement.md
          retention-days: 30
          if-no-files-found: warn
      - name: Gate summary
        if: always()
        env:
          REF: ${{ github.ref }}
        run: |
          {
            echo "## Sentinel Shield Release Gate"
            echo "- Ref: $REF"
            echo ""
            [ -f reports/sentinel-shield-enforcement.md ] && cat reports/sentinel-shield-enforcement.md
          } >> "$GITHUB_STEP_SUMMARY"
