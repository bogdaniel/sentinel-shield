# Sentinel Shield — consuming-project profile.
#
# Copy this file to .sentinel-shield/profile.yaml in your project and edit it.
# scripts/resolve-gates.sh reads this file and resolves it into concrete,
# machine-readable gate thresholds that CI enforces. See docs/gate-resolution.md.
#
# This is the CANONICAL format. The shell fallback parser supports exactly this
# structure (2-space indentation, simple scalars, and the profiles list). Advanced
# YAML (anchors, aliases, inline {}/[] collections, block scalars, quoted booleans)
# requires mikefarah `yq` v4 to be installed.

project:
  name: PROJECT_NAME_HERE
  type: laravel          # laravel | symfony | node | react | docker | other
  criticality: high      # low | medium | high | critical (informational)
  owner: platform-team

# Which Sentinel Shield profiles apply (informational for the resolver).
profiles:
  - laravel
  - react
  - docker
  - github-actions

gates:
  # Adoption mode selects the default fail_on map. See docs/gate-resolution.md.
  #   report-only | baseline | strict | regulated
  mode: baseline

  # Optional per-gate overrides. Any key set here overrides the mode default and
  # is reported explicitly by the resolver (overrides are never hidden). Omit a
  # key to inherit the mode default.
  fail_on:
    secrets: true
    critical_vulnerabilities: true
    high_vulnerabilities: true
    medium_vulnerabilities: false
    architecture_violations: true
    type_errors: true
    test_failures: true
    unsafe_docker: true
    unsafe_github_actions: true
    missing_sbom: false
    missing_release_evidence: false
    expired_exceptions: true
    # Third-party / supply-chain gates (v0.1.5). Separate channel from app SAST.
    # v1 defaults keep these non-blocking in report-only/baseline; strict blocks
    # install_script_risk + network_behavior; regulated blocks all. Override here.
    third_party_suspicious_code: false
    third_party_install_script_risk: false
    third_party_obfuscation: false
    third_party_network_behavior: false
    # Enterprise scanner gates (v0.1.12). Defaults by mode (see docs/enterprise-scanner-matrix.md):
    #   baseline blocks php_syntax_errors + dependency_policy_violations;
    #   strict adds style_violations + iac_violations + container_image_violations;
    #   regulated adds dast_findings + repository_health_warnings.
    #   ai_review_findings is NON-GATING in ALL modes unless you set it true here.
    php_syntax_errors: true
    style_violations: false
    dependency_policy_violations: true
    iac_violations: false
    container_image_violations: false
    dast_findings: false              # DAST is manual/controlled (docs/dast-policy.md)
    repository_health_warnings: false
    ai_review_findings: false         # assistive only (docs/ai-review-policy.md) — keep false

# Third-party suspicious-code scan configuration (v0.1.5). This is a SEPARATE Semgrep
# channel over dependency/vendored code — it does NOT change the normal application
# SAST scan, and does NOT replace Trivy / composer audit / npm audit / Gitleaks /
# SBOM (those still cover dependency CVEs and secrets). See
# docs/third-party-supply-chain-scan.md.
supply_chain:
  third_party_sast:
    # Supported modes: disabled | report-only | scheduled | strict | regulated
    enabled: true
    mode: report-only
    paths:
      - vendor/**
      - node_modules/**
      - public/vendor/**
      - public/js/filament/**
    # When true, strict/regulated may block on high-confidence findings
    # (install_script_risk, network_behavior). The gate flags above + the adoption
    # mode are what the enforcer actually reads; this is the intent/record.
    high_confidence_blocking: false

exceptions:
  allowed: true
  require_owner: true
  require_expiry_date: true
  max_expiry_days: 90

reports:
  output_dir: reports
  format:
    - markdown
    - env
    - json
